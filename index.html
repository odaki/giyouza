<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180" />
<link rel="icon" type="image/png" href="android-touch-icon.png" sizes="192x192" />
<title>ギヨウザルーレット</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0f5c22;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif;
}
h1 {
  display: none; /* スタートアップ画面はCanvasで描画するため常時非表示 */
}
canvas {
  display: block;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 3px #c8a800;
  touch-action: none; /* スクロール・ズームを完全に無効化してタッチ遅延を排除 */
  will-change: filter; /* filter変化をGPUレイヤーで処理してメインスレッドへの影響を軽減 */
}
/* 横向き小型画面: タイトルを非表示にしてキャンバスを最大化 */
@media (max-height: 480px) and (orientation: landscape) {
  h1 { display: none; }
}
/* 全画面ボタン */
/* キャンバスラッパー: ボタンをキャンバス上に重ねるための基準 */
#canvas-wrap {
  position: relative;
  display: inline-block;
  line-height: 0;
}
#fs-btn {
  position: absolute; /* 位置・サイズは fitCanvas() で JS から設定 */
  width: 36px;
  height: 36px;
  padding: 0;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(245,208,32,0.55);
  border-radius: 6px;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  display: none; /* タッチデバイスのみJS側で表示 */
  align-items: center;
  justify-content: center;
  line-height: 0;
  z-index: 200;
}
</style>
</head>
<body>
<h1>ギヨウザルーレット</h1>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <button id="fs-btn" aria-label="全画面切替"></button>
</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
/* タッチデバイス判定 & 向き */
const IS_TOUCH    = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
/* ?portrait URL パラメータでデスクトップからでも縦画面テスト可能 */
const _forcePortrait = new URLSearchParams(location.search).has('portrait');
const IS_PORTRAIT = _forcePortrait || (IS_TOUCH && window.innerWidth < window.innerHeight);

const W = IS_PORTRAIT ? 420  : 1060;
const H = IS_PORTRAIT ? 820  : 560;
canvas.width  = W;
canvas.height = H;

const VERSION = 'v1.76';

/* ── カラー ── */
const Y   = '#f5d020';
const YD  = '#c8a800';
const GN  = '#0f5c22';
const GN2 = '#1a7a30';

const SEG_D = { 'ギ':'#7b1a1a', 'ヨ':'#164d28', 'ウ':'#7a4e00', 'ザ':'#1a2e5a' };
const SEG_L = { 'ギ':'#c0392b', 'ヨ':'#27ae60', 'ウ':'#e8a000', 'ザ':'#2471a3' };

const CHARS  = ['ギ', 'ヨ', 'ウ', 'ザ'];
const TARGET   = ['ギ', 'ヨ', 'ウ', 'ザ'];  // 大当たり
const GIZAGIZA = ['ギ', 'ザ', 'ギ', 'ザ'];  // 中当たり①
const UYOUYO   = ['ウ', 'ヨ', 'ウ', 'ヨ'];  // 中当たり②
const UZAUZA   = ['ウ', 'ザ', 'ウ', 'ザ'];  // 中当たり③
const GIUGIU   = ['ギ', 'ウ', 'ギ', 'ウ'];  // 中当たり④
const GIGIGIGI = ['ギ', 'ギ', 'ギ', 'ギ'];  // 中当たり⑤
const YOYOYOYO = ['ヨ', 'ヨ', 'ヨ', 'ヨ'];  // 中当たり⑥
const UUUU     = ['ウ', 'ウ', 'ウ', 'ウ'];  // 中当たり⑦
const ZAZAZAZA = ['ザ', 'ザ', 'ザ', 'ザ'];  // 中当たり⑧
const GYOGYO   = ['ギ', 'ヨ', 'ギ', 'ヨ'];  // 中当たり⑨

const WR  = IS_PORTRAIT ? 66  : 95;
const WXS = IS_PORTRAIT ? [185, 185, 185, 185] : [230, 430, 630, 830];
/* 縦画面: 全要素間隔を G=21px 均等（キャンバス上下マージン21pxと同一）
   コインヘッダ下端(y=99) +21 → W1中心(186) +132 +21 → W2(339) → W3(492) → W4(645) +132 +21 → BETバー上端(732) */
const WYS = IS_PORTRAIT ? [186, 339, 492, 645] : [235, 235, 235, 235];


/* ── キャッシュ（canvas生成後に初期化） ── */
let bgGradient = null;   // 背景グラジェント（fitCanvas後に1回生成）
let _lastFilter = '';    // canvas.style.filter の前回値（変化時のみ書き込み）
/* getBoundingClientRect() キャッシュ: 入力ハンドラ内での強制レイアウトを排除
   fitCanvas（リサイズ時）にのみ更新する */
let _canvasRect = { left: 0, top: 0, width: 1, height: 1 };
let _noiseBuffer = null; // 事前生成ホワイトノイズバッファ（playNoise用、毎回生成しない）

/* ── 静的レイヤーキャッシュ ──
   雲・獅子は毎フレーム同じパスを繰り返し描画していた。
   OffscreenCanvas に事前描画しておき、drawImage() 1回で済ませる。 */
let _staticLayerCanvas = null; // 雲 + 獅子（PC のみ）を合成した透明オフスクリーン

function _prebuildStaticLayers() {
  /* OffscreenCanvas 未対応の古いブラウザではスキップ（通常描画にフォールバック） */
  if (typeof OffscreenCanvas === 'undefined') return;
  const oc  = new OffscreenCanvas(W, H);
  const oc2 = oc.getContext('2d');

  /* 雲を描く（_drawCloudTo を使って oc2 に直接描画） */
  for (const c of CLOUDS) _drawCloudTo(oc2, c.x, c.y, c.s, c.a, c.r);

  /* PC レイアウトのみ獅子を描く */
  if (!IS_PORTRAIT) {
    _drawShishiTo(oc2, 72,  290, 0.82, false);
    _drawShishiTo(oc2, 988, 290, 0.82, true);
  }
  _staticLayerCanvas = oc;
}

/* ── 文字列キャッシュ（coins/bet が変わった時だけ再計算） ──
   fmt() = toLocaleString('ja-JP') と measureText は毎フレーム呼ぶには重い。
   値が変わった時だけ更新する遅延キャッシュにする。              */
let _cachedCoinsStr  = '';     // fmt(coins)
let _cachedBetStr    = '';     // fmt(bet)
let _cachedBestStr   = '';     // `BEST ${fmt(bestCoins)}`
let _cachedBetIdx    = -1;     // BET_OPTIONS.indexOf(bet)
let _cachedBetNumW   = 0;      // measureText(fmt(bet)) の width
let _cachedBetLabelW = 0;      // measureText('BET') の width — 起動後不変
let _lastCoinsCached = -1;
let _lastBetCached   = -1;
let _lastBestCached  = -1;

/* BET ラベル幅（'BET' 文字列・フォント固定）を一度だけ計測して保存 */
function _initBetLabelWidth() {
  ctx.save();
  ctx.font = IS_PORTRAIT
    ? `bold 24px 'Hiragino Mincho ProN',serif`
    : `bold 28px 'Hiragino Mincho ProN',serif`;
  _cachedBetLabelW = ctx.measureText('BET').width;
  ctx.restore();
}

/* drawBottomBar/drawCoinHeader の先頭で呼ぶ。変化がなければ即 return */
function _updateDisplayCaches() {
  if (coins !== _lastCoinsCached) {
    _lastCoinsCached = coins;
    _cachedCoinsStr  = fmt(coins);
  }
  if (bet !== _lastBetCached) {
    _lastBetCached  = bet;
    _cachedBetStr   = fmt(bet);
    _cachedBetIdx   = BET_OPTIONS.indexOf(bet);
    /* bet 数字幅を計測（フォントサイズはレイアウトに合わせる） */
    ctx.save();
    ctx.font = IS_PORTRAIT
      ? `bold 42px 'Hiragino Mincho ProN',serif`
      : `bold 46px 'Hiragino Mincho ProN',serif`;
    _cachedBetNumW = ctx.measureText(_cachedBetStr).width;
    ctx.restore();
  }
  if (bestCoins !== _lastBestCached) {
    _lastBestCached = bestCoins;
    _cachedBestStr  = `BEST ${fmt(bestCoins)}`;
  }
}

/* ── ギヨウザオブジェクトプール ──
   makeGyozaObj() が毎回 Array.from + 5個のオブジェクト生成＋HSL文字列を生成するのを防ぐ。
   greens配列も事前確保してフィールドをリセットするだけで再利用する。 */
const _GYOZA_POOL_SIZE = 300;
const _gyozaPool = [];
for (let _i = 0; _i < _GYOZA_POOL_SIZE; _i++) {
  _gyozaPool.push({
    x:0, y:0, vx:0, vy:0, rot:0, rotSpd:0, size:0,
    skinL:'', skinD:'', bodyGrd:null, _dead:true,
    greens: [{dx:0,dy:0,rx:0,ry:0,a:0,color:''},{dx:0,dy:0,rx:0,ry:0,a:0,color:''},
             {dx:0,dy:0,rx:0,ry:0,a:0,color:''},{dx:0,dy:0,rx:0,ry:0,a:0,color:''},
             {dx:0,dy:0,rx:0,ry:0,a:0,color:''}],
  });
}
function _gyozaAlloc() {
  for (let i = 0; i < _gyozaPool.length; i++) {
    if (_gyozaPool[i]._dead) return _gyozaPool[i];
  }
  return _gyozaPool[0]; // fallback（最古を強制再利用）
}
/* _deadify: プールオブジェクトを返却するコールバック（swapRemove の onRemove に渡す）
   モジュールスコープ定数なので毎フレーム新しいクロージャが生成されない */
const _deadify      = o => { o._dead = true; };
/* gyozas.sort() に毎フレーム渡す comparator。定数化でクロージャ生成ゼロ */
const _cmpGyozaY    = (a, b) => a.y - b.y;
/* 毎フレーム呼ばれる swapRemove の pred を定数化してクロージャ生成ゼロに */
const _predParticle  = p => p.life > 0 && p.r > 0.3;
const _predTimer     = p => p.timer > 0;
const _predAlive     = o => o.alive;
const _predLife      = o => o.life > 0;
const _predUzaText   = t => t.age < t.life;
const _predRainDrop  = r => r.ripple ? r.life > 0 : r.y < H + 30;
/* H・W は起動後不変なので定数クロージャとして安全に使える */
const _predGyoza     = g => { const r = g.size * 0.52; return g.y < H+120 && g.x+r > 0 && g.x-r < W; };
/* done フェーズで毎フレーム呼ばれる allShown 判定用 pred */
const _predWheelShown = w => !w.result || w.resultPop >= 1;

/* 発射SE用: Cメジャーアルペジオ音程テーブル（4本の矢 = C→E→G→C'）
   モジュールスコープに置いて playSE 呼び出しごとの配列生成を排除 */
const _SHOOT_ARPEGIO = [noteHz('C',5), noteHz('E',5), noteHz('G',5), noteHz('C',6)];

/* ── 毎フレーム生成を避けるための描画用ルックアップテーブル ──
   テンプレートリテラルによる毎フレーム文字列アロケーションを排除する。
   ① ビートリングの strokeStyle: bp(0〜1) を 32段階に量子化
   ② _syncBarColor の動的 rgb 文字列: r(0〜1) を 64段階に量子化        */
const _BEAT_RING_COLORS = /* 32段階 rgba(245,208,32, 0〜0.55) */
  Array.from({length:32}, (_,i) => `rgba(245,208,32,${((i/31)*0.55).toFixed(4)})`);
const _BEAT_BORDER_COLORS = /* ミュート時枠線: rgba(245,208,32, 0.3〜0.85) */
  Array.from({length:32}, (_,i) => `rgba(245,208,32,${(0.3 + (i/31)*0.55).toFixed(4)})`);
/* _syncBarColor 用カラーテーブル: 64段階 × 各レンジの rgb 文字列をキャッシュ */
const _SYNC_RGB_TABLE = (() => {
  const t64 = Array.from({length:64});
  return {
    green:  t64.map((_,i) => { const t=i/63; return `rgb(${(60+155*t)|0},200,40)`; }),
    yellow: t64.map((_,i) => { const t=i/63; return `rgb(220,${(100+100*t)|0},30)`; }),
    red:    t64.map((_,i) => { const t=i/63; return `rgb(200,${(60*t)|0},30)`;      }),
  };
})();

/* ── 同期メーターのテキストキャッシュ（毎フレームのテンプレートリテラルを排除） ── */
let _cachedSyncPctVal = -1, _cachedSyncPctStr = '';
let _cachedSyncChainVal = -1, _cachedSyncChainStr = '';

/* ── 中当たりエフェクト用プール群 ──
   gigiSparks: 最大レート8/frame×寿命24f ≈ 200同時、余裕を持って256
   rainDrops:  最大レート20/frame×寿命30f ≈ 600 + 波紋20 → 800
   uzaTexts:   最大1/2f×寿命240f ≈ 120同時 → 160 */
function _makePool(size, factory) {
  const pool = [];
  for (let i = 0; i < size; i++) pool.push(factory());
  return pool;
}
function _poolAlloc(pool) {
  for (let i = 0; i < pool.length; i++) if (pool[i]._dead) return pool[i];
  return pool[0]; // fallback
}
/* _swapRemovePool は swapRemove(arr, pred, _deadify) に統一したため削除 */

const _gigiPool = _makePool(256, () =>
  ({ x:0, y:0, vx:0, vy:0, life:0, color:'', r:0, _dead:true }));
const _rainPool = _makePool(800, () =>
  ({ x:0, y:0, vx:0, vy:0, len:0, a:0, splashed:false, ripple:false, life:0, maxLife:0, _dead:true }));
const _uzaPool  = _makePool(160, () =>
  ({ x:0, y:0, text:'', rot:0, size:0, alpha:0, peak:0, color:'', age:0, life:0, _dead:true }));

/* ── パーティクルプール ──
   パーティクルオブジェクトを事前確保して再利用し、GCを排除する。
   最大同時使用数: リーチジャックポット(48) + 複数エフェクト重複 → 512で余裕を持つ */
const _PART_POOL_SIZE = 512;
const _partPool = [];
for (let _i = 0; _i < _PART_POOL_SIZE; _i++) {
  _partPool.push({ x:0, y:0, vx:0, vy:0, color:'', life:0, r:0, _dead:true });
}
/* プールから死んでいるエントリを確保して返す。満杯の場合は先頭を強制再利用 */
function _partAlloc() {
  for (let i = 0; i < _partPool.length; i++) {
    if (_partPool[i]._dead) return _partPool[i];
  }
  return _partPool[0]; // fallback（短命パーティクルが1つ消えるだけ）
}
/* パーティクル追加ヘルパー（particles.push({...}) の代替）
   プールオブジェクトを再利用することでGCゼロを実現 */
function spawnParticle(x, y, vx, vy, color, life, r) {
  const p = _partAlloc();
  p.x = x; p.y = y; p.vx = vx; p.vy = vy;
  p.color = color; p.life = life; p.r = r; p._dead = false;
  particles.push(p);
}
/* GC削減: filter()の代わりにswap-and-popでdeadな要素をインプレース除去
   pred がtrueの要素を保持する（filter同様の意味）
   onRemove（省略可）: 除去された要素に呼ぶコールバック。
     プールオブジェクトを返却する場合は _deadify を渡す。
   ホットループ内の条件分岐を排除するため onRemove の有無でパスを分岐する。 */
function swapRemove(arr, pred, onRemove) {
  if (onRemove) {
    for (let i = arr.length - 1; i >= 0; i--) {
      if (!pred(arr[i])) { onRemove(arr[i]); arr[i] = arr[arr.length-1]; arr.length--; }
    }
  } else {
    for (let i = arr.length - 1; i >= 0; i--) {
      if (!pred(arr[i])) { arr[i] = arr[arr.length-1]; arr.length--; }
    }
  }
}

/* ── game state ── */
let wheels, curIdx, phase, particles;
let arrowProgress, arrowSX, arrowSY, arrowTX, arrowTY;
let _arrowStartAudioTime = 0; // 発射時の audioCtx.currentTime（着弾音スケジュール用）
let _arrowStartWallTime  = 0; // 発射時の performance.now()/1000（矢アニメ用: suspended中も進む）
const ARROW_FLIGHT_SEC = 4 / 60; // 矢の飛行時間: 67ms固定（フレームレート非依存）
let shootGuard = 0;    // init直後の誤射防止フレームカウンタ
let pendingShoot = false; // done/tapestart中の先打ちクリックバッファ
let slowRampEndTime = 0;   // スローランプ終了のaudioCtx時刻（0=ランプなし）
let slowHandLockFrames = 0; // スローハンド発動直後の入力ロックフレーム数
let slowHandPopTimer  = 0; // バッジポップアニメーション（発動時に25→0カウントダウン）
/* グレースケール: AudioParam.value が setValueCurveAtTime 中に intrinsic 値を返す
   ブラウザ実装差異を回避するため JS 側で独立管理 */
let grayRateTarget = 1.0; // 目標レート（1=通常,0.5=スロー,0.001=ゲームオーバー）
let grayRateCur    = 1.0; // 現在の視覚レート（毎フレームlerpで追従）
/* hitType: 当たり結果を1変数で管理（bool変数11個を統一）
   'none' | 'jackpot' | 'gizagiza' | 'uyouyo' | 'uzauza' | 'giugiu'
   | 'gigigigi' | 'yoyoyoyo' | 'uuuu' | 'zazazaza' | 'gyogyo' */
let hitType = 'none';
let endTimer, canRestart;
/* リーチ演出 */
let isReach, reachTimer, isReachJackpot;
let reachFlash = 0; // 白フラッシュ用タイマー

/* ── ギヨウザコイン ── */
const BET_OPTIONS = [1, 5, 10, 25, 50, 100, 250, 500, 1000, 5000, 10000, 50000, 100000, 500000, 1000000];
/* 配当倍率（没収型: 掛け金は戻らない） */
const PAYOUT_RATE = {
  reachJackpot: 50,
  jackpot:      20,
  hitMed4:      10,  // GIZAGIZA/UYOUYO/GIUGIU/GYOGYO
  hitMed3:       5,  // GIGIGIGI/YOYOYOYO/UUUU/ZAZAZAZA
};

/* 当たり判定テーブル:
   pat     = 4文字パターン
   payout  = PAYOUT_RATE のキー
   medId   = checkMediumAch に渡すID（jackpotはnull）
   onHit   = 当たり時に呼ぶエフェクト初期化関数（なければnull）
   ※ 関数宣言はホイスティングされるため、この定数より後に定義された関数も参照可能 */
const HIT_TABLE = [
  { type:'jackpot',  pat:TARGET,   payout:'jackpot',  medId:null,        onHit:null             },
  { type:'gizagiza', pat:GIZAGIZA, payout:'hitMed4',  medId:'gizagiza',  onHit:launchGizaFireworks },
  { type:'uyouyo',   pat:UYOUYO,   payout:'hitMed4',  medId:'uyouyo',    onHit:initWorms           },
  { type:'uzauza',   pat:UZAUZA,   payout:'hitMed4',  medId:'uzauza',    onHit:initUzaTexts        },
  { type:'giugiu',   pat:GIUGIU,   payout:'hitMed4',  medId:'giugiu',    onHit:initGiugiu          },
  { type:'gigigigi', pat:GIGIGIGI, payout:'hitMed3',  medId:'gigigigi',  onHit:null                },
  { type:'yoyoyoyo', pat:YOYOYOYO, payout:'hitMed3',  medId:'yoyoyoyo',  onHit:initYoyoyoyo        },
  { type:'uuuu',     pat:UUUU,     payout:'hitMed3',  medId:'uuuu',      onHit:initUuuu            },
  { type:'zazazaza', pat:ZAZAZAZA, payout:'hitMed3',  medId:'zazazaza',  onHit:initZazazaza        },
  { type:'gyogyo',   pat:GYOGYO,   payout:'hitMed4',  medId:'gyogyo',    onHit:initGyogyo          },
];
let coins, bet, betLocked, isGameOver;
let isMissResult = false;   // ハズレフラグ（自動リセット制御用）
let isSlowSpin   = false;   // 低確率: 回転速度半減イベント
let missPopups   = []; // ハズレポップアップ（複数同時・トライ横断フェードアウト）
let payoutPopups = []; // 獲得ポップアップ（複数同時・トライ横断フェードアウト）
/* ── ビートシンク ── */
const SYNC_HIST_LEN  = 16;
const _syncHistBuf   = new Float32Array(SYNC_HIST_LEN); // リングバッファ（shift()不要）
let   _syncHistHead  = 0; // 次の書き込み位置
let   _syncHistCount = 0; // 有効エントリ数（最大SYNC_HIST_LEN）
let syncRate     = 0;  // 平均同期率（0-1）
let _autoDecayBeatIdx = -1; // ビート自動減衰: 最後に処理したビート番号

/* syncRateリングバッファへスコアを1件追加し syncRate / 表示カウンタを更新する。
   onShoot() からも、ビート自動減衰からも呼ばれる。 */
function _pushSyncScore(score) {
  _syncHistBuf[_syncHistHead] = score;
  _syncHistHead = (_syncHistHead + 1) % SYNC_HIST_LEN;
  if (_syncHistCount < SYNC_HIST_LEN) _syncHistCount++;
  let _s = 0;
  for (let _i = 0; _i < _syncHistCount; _i++) _s += _syncHistBuf[_i];
  syncRate = _s / _syncHistCount;
  if (syncRate >= 0.5) {
    syncRateAboveCount++;
    syncRateBelowCount = 0;
  } else {
    syncRateBelowCount++;
    if (syncRateBelowCount >= SYNC_VISIBLE_THRESHOLD) syncRateAboveCount = 0;
  }

  if (!audioCtx) return;
  if (_noiseBuffer && _noiseBuffer.sampleRate === audioCtx.sampleRate) return;
  const len  = Math.ceil(audioCtx.sampleRate * 0.45); // 最長ノイズ(0.35s)より余裕を持った長さ
  const buf  = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  _noiseBuffer = buf;
}

/* 基本オシレーター再生 */
function playOsc(ctx, type, freq, startT, dur, vol, decay, slurTarget, vibrato, dest) {
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  /* dest未指定時: ライブコンテキストならmasterGain経由（ミュート制御）、
     OfflineAudioContextならdestination直結（レンダリング用）              */
  osc.connect(gain); gain.connect(dest ?? (ctx === audioCtx ? masterGain : ctx.destination) ?? ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startT);
  /* ビブラート: LFO で周波数変調（薄くかけるため delay 後にフェードイン） */
  if (vibrato) {
    const lfo     = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.type = 'sine';
    lfo.frequency.setValueAtTime(vibrato.rate  ?? 5.5, startT);
    lfoGain.gain.setValueAtTime(0, startT);
    lfoGain.gain.linearRampToValueAtTime(vibrato.depth ?? 5, startT + (vibrato.delay ?? 0.5));
    lfo.start(startT);
    lfo.stop(startT + dur + (decay ?? 0.08) + 0.1);
  }
  gain.gain.setValueAtTime(vol, startT);
  if (slurTarget != null) {
    gain.gain.exponentialRampToValueAtTime(Math.max(slurTarget, 0.001), startT + dur);
    gain.gain.exponentialRampToValueAtTime(0.0001, startT + dur + (decay ?? 0.02));
    osc.start(startT);
    osc.stop(startT + dur + (decay ?? 0.02) + 0.02);
  } else {
    gain.gain.exponentialRampToValueAtTime(0.0001, startT + dur + (decay ?? 0.08));
    osc.start(startT);
    osc.stop(startT + dur + (decay ?? 0.08) + 0.02);
  }
}

/* ノイズバースト（ハイハット・打撃音用）
   _noiseBuffer を使い回すことでフレームごとのランダム生成ループを排除する。
   OfflineAudioContext（BGMレンダリング）への使用時は ctx が異なるため個別生成にフォールバック */
function playNoise(ctx, startT, dur, vol, hpFreq, dest) {
  let buf;
  if (ctx === audioCtx && _noiseBuffer && _noiseBuffer.sampleRate === ctx.sampleRate) {
    buf = _noiseBuffer; // 事前生成バッファを再利用（ランダムループなし）
  } else {
    /* フォールバック: OfflineAudioContext または未初期化時 */
    const len  = Math.ceil(ctx.sampleRate * (dur + 0.05));
    buf        = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  }
  const src    = ctx.createBufferSource();
  src.buffer   = buf;
  const hp     = ctx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = hpFreq ?? 4000;
  const gain   = ctx.createGain();
  gain.gain.setValueAtTime(vol, startT);
  gain.gain.exponentialRampToValueAtTime(0.0001, startT + dur);
  src.connect(hp); hp.connect(gain);
  gain.connect(dest ?? (ctx === audioCtx ? masterGain : ctx.destination) ?? ctx.destination);
  src.start(startT); src.stop(startT + dur + 0.05);
}

/* ── BGM: 中華風ペンタトニック・パチンコループ ── */
/* ペンタトニック: C D E G A */
const BGM_BPM   = 152;
const BGM_BEAT  = 60 / BGM_BPM;
/* 16ステップ（各0.5拍 = 16分音符） */
/* [note, octave, vol] または null=休符 */
const BGM_MEL = [
  ['G',4,0.38], ['E',4,0.28], ['G',4,0.38], ['A',4,0.42],
  ['G',4,0.35], ['E',4,0.28], ['D',4,0.28], ['C',4,0.32],
  ['E',4,0.32], ['G',4,0.38], ['A',4,0.42], ['G',4,0.35],
  ['E',4,0.30], ['D',4,0.28], ['C',5,0.42], null,
];
const BGM_BASS = [
  ['C',3,0.28], null, ['G',3,0.22], null,
  ['A',3,0.22], null, ['G',3,0.22], null,
  ['C',3,0.28], null, ['E',3,0.22], null,
  ['G',3,0.22], null, ['C',3,0.30], null,
];
/* ハイハット: 偶数ステップ=強, 奇数=弱 */
const BGM_HAT = [0.16,0.06,0.16,0.06, 0.16,0.06,0.16,0.06,
                 0.16,0.06,0.16,0.06, 0.16,0.06,0.16,0.06];
/* バスドラム: 全拍打ち（4つ打ち）ステップ0,2,4,6,8,10,12,14 */
const BGM_KICK = new Set([0,2,4,6,8,10,12,14]);
/* 1ループの長さ（秒）*/
const BGM_LOOP_DUR = BGM_BEAT * 0.5 * BGM_MEL.length; // ≈3.158s
const BEAT_DIV4    = BGM_BEAT / 4;  // 16分音符 ≈ 0.099s
const BEAT_DIV3    = BGM_BEAT / 3;  // 8分3連   ≈ 0.132s

/* ─── BGMループをオフラインレンダリングしてAudioBufferを返す ─── */
async function renderBGMBuffer(sampleRate) {
  const totalSec  = BGM_LOOP_DUR + 0.4; // 末尾にリリース余白
  const offCtx    = new OfflineAudioContext(2, Math.ceil(sampleRate * totalSec), sampleRate);
  const dest      = offCtx.destination;
  for (let s = 0; s < BGM_MEL.length; s++) {
    const t   = s * BGM_BEAT * 0.5;
    const dur = BGM_BEAT * 0.5;
    const mel = BGM_MEL[s];
    if (mel) playOsc(offCtx, 'triangle', noteHz(mel[0], mel[1]), t, dur * 0.85, mel[2], 0.06, null, null, dest);
    const bas = BGM_BASS[s];
    if (bas) playOsc(offCtx, 'sine',     noteHz(bas[0], bas[1]), t, dur * 1.6,  bas[2], 0.10, null, null, dest);
    playNoise(offCtx, t, 0.04, BGM_HAT[s], 8000, dest);
    if (BGM_KICK.has(s)) {
      const osc  = offCtx.createOscillator();
      const gain = offCtx.createGain();
      osc.connect(gain); gain.connect(dest);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(110, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
      gain.gain.setValueAtTime(0.45, t);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
      osc.start(t); osc.stop(t + 0.21);
    }
  }
  return offCtx.startRendering();
}

/* ─── BGMソース管理ユーティリティ ─── */
function _destroyBGMSource() {
  if (bgmSource) {
    bgmSource.onended = null;
    try { bgmSource.stop(); } catch(e) {}
    bgmSource.disconnect();
    bgmSource = null;
  }
}

function _createBGMSource(startRate = 1.0) {
  if (!audioCtx || !bgmBuffer) return null;
  _destroyBGMSource();
  const src      = audioCtx.createBufferSource();
  src.buffer     = bgmBuffer;
  src.loop       = true;
  src.loopEnd    = BGM_LOOP_DUR;
  src.playbackRate.value = startRate;
  _setBgmRateJS(startRate, startRate, 0, 0); // 即時セット（ランプなし）
  src.connect(bgmGain);
  bgmSource = src;
  return src;
}

/* ─── BGM制御API ─── */

/* ── ミュート制御（masterGain のみ制御。bgmGain/ソースは触らない） ── */
function applyMuteGain() {
  if (!masterGain || !audioCtx) return;
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.setValueAtTime(audioMuted ? 0 : 1, audioCtx.currentTime);
}

/* BGMソース起動（ミュート状態を問わず起動。gain が音量を制御する） */
function startBGM() {
  if (!audioCtx) return;
  if (!bgmBuffer) {
    /* バッファがまだレンダリング中 → 完了後に自動起動するフラグを立てる */
    bgmPendingStart = true;
    return;
  }
  bgmPendingStart = false;
  if (bgmSource) return; // すでに再生中
  /* bgmGain は常に1（ミュートは masterGain が担う） */
  bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
  bgmGain.gain.setValueAtTime(1, audioCtx.currentTime);
  const src = _createBGMSource(1.0);
  if (src) { src.start(); bgmPhaseRef = audioCtx.currentTime; _bgmAccumReset(); }
  grayRateTarget = 1.0; grayRateCur = 1.0; // 通常BGM開始時はグレースケール即時解除
}

/* reach/jackpot SE中のBGM一時消音（ソースは動かし続ける） */
function stopBGM() {
  if (bgmRestartTimer) { clearTimeout(bgmRestartTimer); bgmRestartTimer = null; }
  stopJingle();
  /* ソースは停止せず gain だけ 0 にする（SE中もBGMはループし続ける） */
  if (bgmGain && audioCtx) {
    bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
    bgmGain.gain.setValueAtTime(0, audioCtx.currentTime);
  }
}

/* SE終了後に bgmGain を 1 に戻す（ミュート制御は masterGain が担うので無条件で 1） */
function scheduleBGMRestart(delayMs) {
  if (bgmRestartTimer) { clearTimeout(bgmRestartTimer); bgmRestartTimer = null; }
  bgmRestartTimer = setTimeout(() => {
    bgmRestartTimer = null;
    if (bgmGain && audioCtx) {
      bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
      bgmGain.gain.setValueAtTime(1, audioCtx.currentTime);
    }
  }, delayMs);
}

/* テープ速度カーブ生成
   easeOut: 最初に素早く落ちてじわり停止（テープが止まる感じ）
            sin(p*π/2) → p=0で傾き大、p=1で傾き0
   easeIn:  じわりと動き出して加速（世界が動き始める感じ）
            1-cos(p*π/2) → p=0で傾き0、p=1で傾き大 */
function _tapeRateCurve(from, to, easeType, N = 64) {
  const curve = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    curve[i] = from + (to - from) * _easeF(i / (N - 1), easeType);
  }
  return curve;
}

/* テープが止まるように減速停止（ゲームオーバー専用） */
function stopBGMTape(durationMs = 1300) {
  if (bgmRestartTimer) { clearTimeout(bgmRestartTimer); bgmRestartTimer = null; }
  stopJingle();
  if (!bgmSource || !audioCtx) { _destroyBGMSource(); return; }
  /* ソースを止めずに極低速（0.001x）まで落とす。
     再生位置がほぼ止まったまま保持されるので、リセット時に同じ場所から加速できる。 */
  const t       = audioCtx.currentTime;
  const curRate = _getBgmRateJS(); // .value は自動化中に正しい値を返さないため JS 側で取得
  bgmSource.playbackRate.cancelScheduledValues(t);
  /* easeOut: 最初に素早くテンポが落ち、最後にじわり停止 */
  bgmSource.playbackRate.setValueCurveAtTime(
    _tapeRateCurve(curRate, 0.001, 'easeOut'), t, durationMs / 1000);
  _setBgmRateJS(curRate, 0.001, t, durationMs / 1000, 'easeOut');
  grayRateTarget = 0.001; // グレースケールを最大に向かってアニメーション
}

/* テープが回り始めるように加速（ゲームオーバーリセット専用）
   既存ソースがあればその位置から加速、なければ新規作成 */
function startBGMTape(durationMs = 1400) {
  if (!audioCtx) return;
  bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
  bgmGain.gain.setValueAtTime(1, audioCtx.currentTime);
  const t = audioCtx.currentTime;
  if (bgmSource) {
    /* 極低速で回り続けているソースを現在位置からeaseInで加速 */
    const curRate = _getBgmRateJS(); // .value は自動化中に正しい値を返さないため JS 側で取得
    bgmSource.playbackRate.cancelScheduledValues(t);
    /* easeIn: じわりと動き出し、後半で加速して通常速度へ */
    bgmSource.playbackRate.setValueCurveAtTime(
      _tapeRateCurve(curRate, 1.0, 'easeIn'), t, durationMs / 1000);
    _setBgmRateJS(curRate, 1.0, t, durationMs / 1000, 'easeIn');
  } else {
    /* フォールバック: ソースが消えていた場合は新規作成してeaseIn加速 */
    if (!bgmBuffer) return;
    const src = _createBGMSource(0.001);
    if (!src) return;
    src.playbackRate.setValueCurveAtTime(
      _tapeRateCurve(0.001, 1.0, 'easeIn'), t, durationMs / 1000);
    _setBgmRateJS(0.001, 1.0, t, durationMs / 1000, 'easeIn');
    src.start();
    bgmPhaseRef = t + durationMs / 1000; // 加速完了時点を拍グリッド基準にする
    _bgmAccumReset(); // 新規ソースなので積算位置もリセット
    grayRateCur = 0.001; // フォールバック時はグレースケール現在値もリセット
  }
  grayRateTarget = 1.0; // グレースケールを解除方向へアニメーション
}

/* BET額に対応するスローハンドBGM速度比率を返す
   BET=1→30%, BET=100000→90%, 対数補間 */
function _slowHandRate(betVal) {
  return 0.50 + 0.48 * Math.log10(Math.max(1, betVal)) / 6;
}

/* BGMのplaybackRateを現在値から targetRate へテープカーブでなめらかに変化させる
   スローイベント開始・終了時のテンポ演出に使用 */
/* blockInput=true のときだけランプ中のクリックを無視する
   自動ランプ（init切替・当たり復帰・tapestart）は false、
   Ctrl+T のインタラクティブ切り替えは true */
function rampBGMRate(targetRate, durationMs = 1200, easeType = 'easeOut', blockInput = false) {
  if (!bgmSource || !audioCtx) return;
  const t       = audioCtx.currentTime;
  const curRate = _getBgmRateJS(); // .value は自動化中に正しい値を返さないため JS 側で取得
  if (Math.abs(curRate - targetRate) < 0.005) return; // すでに目標値
  bgmSource.playbackRate.cancelScheduledValues(t);
  bgmSource.playbackRate.setValueCurveAtTime(
    _tapeRateCurve(curRate, targetRate, easeType), t, durationMs / 1000);
  _setBgmRateJS(curRate, targetRate, t, durationMs / 1000, easeType);
  grayRateTarget = targetRate; // グレースケールも同じ目標へ追従
  /* 入力ブロックが必要な場合のみランプ終了時刻を記録 */
  if (blockInput) slowRampEndTime = t + durationMs / 1000;
}


/* 最初のユーザー操作で AudioContext を作成・resume・unlock する
   ジェスチャー内で行わないと iOS Safari 等で suspended のまま音が出ない */
function _onFirstGesture() {
  document.removeEventListener('keydown',    _onFirstGesture, true);
  document.removeEventListener('mousedown',  _onFirstGesture, true);
  document.removeEventListener('touchstart', _onFirstGesture, true);
  const ctx = getAudioCtx();
  ctx.resume().then(() => {
    /* iOS Safari unlock: 無音バッファを1サンプル再生して audio system を活性化 */
    const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0);
  }).catch(() => {});
}
document.addEventListener('keydown',    _onFirstGesture, true);
document.addEventListener('mousedown',  _onFirstGesture, true);
document.addEventListener('touchstart', _onFirstGesture, true);

function toggleMute() {
  audioMuted = !audioMuted;
  try { localStorage.setItem(LS_MUTE, audioMuted ? '1' : '0'); } catch(e) {}
  /* ミュートは gain だけを制御する。BGMソースの起動・停止はしない。 */
  applyMuteGain();
}

/* ── 効果音 ── */
function playSE(name, atTime) {
  if (audioMuted || !audioCtx || audioCtx.state !== 'running') return;
  const ctx = audioCtx;
  const t   = atTime ?? (ctx.currentTime + 0.01);
  switch (name) {
    case 'shoot': {
      /* 弓を放つ音: noise（弦の放つ音）+ Cメジャーアルペジオ
         4本の矢ごとに C5→E5→G5→C6 と音程が上がり、コードが積み上がる演出
         curIdx は発射時の矢番号（0〜3）をグローバル変数から参照 */
      playNoise(ctx, t, 0.05, 0.20, 3000);
      playOsc(ctx, 'triangle', _SHOOT_ARPEGIO[Math.min(curIdx, 3)], t, 0.03, 0.15, 0.06);
      break;
    }
    case 'lock': {
      /* コツン */
      playOsc(ctx, 'square', 320, t, 0.04, 0.22, 0.04);
      playOsc(ctx, 'square', 200, t+0.025, 0.03, 0.15, 0.04);
      break;
    }
    case 'bet': {
      /* カチッ */
      playNoise(ctx, t, 0.03, 0.18, 6000);
      playOsc(ctx, 'square', 880, t, 0.02, 0.10, 0.02);
      break;
    }
    case 'reach': {
      /* ジャジャーン: 緊張感あるコード */
      stopBGM(); // BGM一時停止してSEを際立たせる
      const chord = [220, 277.18, 329.63, 415.30]; // Am7 風
      chord.forEach((f, i) => {
        playOsc(ctx, 'sawtooth', f, t + i*0.04, 1.2, 0.18, 0.6);
      });
      playNoise(ctx, t, 0.2, 0.3, 200);
      /* 0.8秒後にBGM再開 */
      scheduleBGMRestart(900);
      break;
    }
    case 'medium': {
      /* 中当たり: 上昇フレーズ */
      const mscale = [noteHz('C',5), noteHz('E',5), noteHz('G',5), noteHz('C',6)];
      mscale.forEach((f, i) => playOsc(ctx, 'triangle', f, t + i*0.08, 0.25, 0.30, 0.12));
      break;
    }
    case 'jackpot': {
      /* 大当たりファンファーレ */
      stopBGM();
      const fanfare = [
        [noteHz('C',5), 0.00, 0.15],
        [noteHz('E',5), 0.12, 0.15],
        [noteHz('G',5), 0.24, 0.15],
        [noteHz('C',6), 0.36, 0.40],
        [noteHz('G',5), 0.60, 0.12],
        [noteHz('C',6), 0.72, 0.50],
      ];
      fanfare.forEach(([f, dt, d]) => playOsc(ctx, 'square', f, t+dt, d, 0.28, 0.08));
      /* ベース */
      [noteHz('C',3), noteHz('G',3)].forEach((f, i) =>
        playOsc(ctx, 'sine', f, t + i*0.36, 0.6, 0.32, 0.2));
      scheduleBGMRestart(2000);
      break;
    }
    case 'reach_jackpot': {
      /* 超大当たり: より派手なファンファーレ */
      stopBGM();
      const big = [
        [noteHz('C',5), 0.00, 0.12], [noteHz('E',5), 0.10, 0.12],
        [noteHz('G',5), 0.20, 0.12], [noteHz('C',6), 0.30, 0.30],
        [noteHz('E',6), 0.55, 0.12], [noteHz('G',6), 0.65, 0.12],
        [noteHz('C',7), 0.75, 0.60],
      ];
      big.forEach(([f, dt, d]) => {
        playOsc(ctx, 'square',    f,   t+dt, d, 0.24, 0.08);
        playOsc(ctx, 'sawtooth',  f*2, t+dt, d, 0.10, 0.08);
      });
      /* 連続コイン音 */
      for (let i = 0; i < 8; i++)
        playOsc(ctx, 'sine', noteHz('C',6) * (1 + i*0.05), t + 0.9 + i*0.07, 0.08, 0.22, 0.05);
      playNoise(ctx, t, 0.3, 0.35, 100);
      scheduleBGMRestart(2500);
      break;
    }
    case 'miss': {
      /* ズコー: D4→E2 スライド（元のキャラを保ちつつCメジャーのノートに調律） */
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(masterGain ?? ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(noteHz('D', 4), t);
      osc.frequency.exponentialRampToValueAtTime(noteHz('E', 2), t + 0.45);
      gain.gain.setValueAtTime(0.22, t);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.50);
      osc.start(t); osc.stop(t + 0.52);
      break;
    }
    case 'coin': {
      /* コインじゃらじゃら */
      for (let i = 0; i < 5; i++) {
        const f = noteHz('C', 6) * (0.95 + Math.random() * 0.15);
        playOsc(ctx, 'sine', f, t + i*0.055, 0.12, 0.20, 0.08);
      }
      break;
    }
    case 'gameover': {
      /* ゲームオーバー: 悲しい下降 */
      const goSeq = [
        [noteHz('G',4), 0.00, 0.3],
        [noteHz('E',4), 0.25, 0.3],
        [noteHz('C',4), 0.50, 0.3],
        [noteHz('A',3), 0.75, 0.6],
      ];
      goSeq.forEach(([f, dt, d]) => playOsc(ctx, 'triangle', f, t+dt, d, 0.28, 0.15));
      break;
    }
    case 'ach': {
      /* 実績解除: キラン */
      const achSeq = [noteHz('E',5), noteHz('G',5), noteHz('A',5), noteHz('E',6)];
      achSeq.forEach((f, i) => playOsc(ctx, 'sine', f, t + i*0.06, 0.15, 0.25, 0.10));
      break;
    }
    case 'sync_just': break; // 廃止: 視覚表示（JUST!/GOOD）のみ、SE なし
    case 'slow_hand': {
      /* スローハンド発動: テープが引っかかって遅くなるような"ウォ〜ン"音 */
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(masterGain ?? ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(520, t);
      osc.frequency.exponentialRampToValueAtTime(180, t + 0.65);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.linearRampToValueAtTime(0.32, t + 0.05);
      gain.gain.setValueAtTime(0.32, t + 0.20);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.75);
      osc.start(t); osc.stop(t + 0.77);
      /* 低音の重さを加える */
      playOsc(ctx, 'triangle', 80, t + 0.05, 0.4, 0.18, 0.25);
      /* 短いノイズバースト（テープのこすれ感） */
      playNoise(ctx, t, 0.06, 0.12, 400);
      break;
    }
  }
}
