    outText('ヨ ヨ ヨ ヨ',0,78, '#aaffee', 'rgba(0,30,30,0.88)', 7);
    ctx.restore();

  /* ━━ ウウウウ 中当たり ━━ */
  } else if (isUuuu) {
    /* ゆらゆら漂う */
    const fx = Math.sin(endTimer*0.04)*5, fy = Math.cos(endTimer*0.03)*3;
    ctx.save(); ctx.translate(W/2+fx, cy+fy);
    ctx.font=`bold 78px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#aaccff'; ctx.shadowBlur=55;
    outText('中当たり！',0,0, '#cce8ff', 'rgba(0,10,40,0.92)', 10);
    ctx.shadowBlur=20;
    ctx.font=`bold 38px 'Hiragino Mincho ProN',serif`;
    outText('ウ ウ ウ ウ',0,78, '#e8f4ff', 'rgba(0,10,40,0.88)', 7);
    ctx.restore();

  /* ━━ ザザザザ 中当たり ━━ */
  } else if (isZazazaza) {
    ctx.save(); ctx.translate(W/2, cy);
    ctx.font=`bold 78px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#66aaff'; ctx.shadowBlur=45;
    outText('中当たり！',0,0, '#88ccff', 'rgba(0,10,40,0.92)', 10);
    ctx.shadowBlur=18;
    ctx.font=`bold 38px 'Hiragino Mincho ProN',serif`;
    outText('ザ ザ ザ ザ',0,78, '#bbddff', 'rgba(0,10,40,0.88)', 7);
    ctx.restore();

  /* ━━ ギョギョ 中当たり ━━ */
  } else if (isGyogyo) {
    /* ビクビク揺れる驚き演出 */
    const shock = (Math.random() - 0.5) * 5;
    const scaleX = 1 + Math.sin(endTimer * 0.22) * 0.04;
    ctx.save(); ctx.translate(W/2 + shock, cy); ctx.scale(scaleX, 1);
    ctx.font=`bold 78px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#ffcc00'; ctx.shadowBlur=55;
    outText('中当たり！',0,0, '#ffee44', 'rgba(40,20,0,0.92)', 10);
    ctx.shadowBlur=20;
    ctx.font=`bold 38px 'Hiragino Mincho ProN',serif`;
    outText('ギョ ギョ ！',0,78, '#ffe066', 'rgba(40,20,0,0.88)', 7);
    ctx.restore();

  /* ━━ ハズレ: drawMissPopup() で描画 ━━ */
  } else { /* miss */ }

  /* 獲得ポップアップ */
  if (payoutTimer > 0 && payoutAmt > 0) {
    const pt = payoutTimer / 150;
    const popAlpha = pt < 0.2 ? pt / 0.2 : pt > 0.7 ? (pt - 0.7) / 0.3 * -1 + 1 : 1;
    const popY = cy - 60 - (1 - pt) * 30;
    ctx.save();
    ctx.globalAlpha = popAlpha * 0.95;
    ctx.font = `bold 42px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = Y; ctx.shadowBlur = 30;
    outText(`＋${fmt(payoutAmt)}ギヨウザ！`, W/2, popY, Y, 'rgba(0,0,0,0.9)', 8);
    ctx.restore();
  }

  /* ゲームオーバー */
  if (isGameOver) {
    ctx.save();
    ctx.globalAlpha = alpha;
    /* 暗幕強化 */
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = `bold 62px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ff4422'; ctx.shadowBlur = 40;
    outText('ギヨウザがなくなりました', W/2, H/2 - 30, '#ff8866', 'rgba(0,0,0,0.92)', 9);
    ctx.shadowBlur = 0;
    if (canRestart) {
      const blink = 0.45 + 0.45 * Math.sin(endTimer * 0.1);
      ctx.globalAlpha = blink;
      ctx.font = `bold 22px 'Hiragino Mincho ProN',serif`;
      outText(
        IS_TOUCH ? '[ タップ ] で100ギヨウザに戻す' : '[ スペース ] で100ギヨウザに戻す',
        W/2, H/2 + 50, '#ffe0d0', 'rgba(0,0,0,0.85)', 5
      );
    }
    ctx.restore();
  }
  ctx.restore();
}

function drawAchBanner() {
  if (!achBannerCurrent || achBannerTimer <= 0) return;

/* ── 実績一覧オーバーレイ ──
   縦画面: 1カラム・行高44px・クリップ表示（全18件収まる）
   PC版 : 2カラム                                              */
let achScrollY = 0; // 縦画面スクロールオフセット（将来用・現状0固定）

function drawAchOverlay() {
  if (!showAchievements) return;

  /* ── パネルサイズをレイアウトに合わせて決定 ── */
  /* 縦画面: アイコン右端(46) + 12px = 58 → パネル左端
             右ボタン左端(374) - 12px = 362 → パネル右端
             pw = 362 - 58 = 304                                */
  const px = IS_PORTRAIT ? 58        : 60;
  const py = IS_PORTRAIT ? 16        : 30;
  const pw = IS_PORTRAIT ? 304       : W - 120;
  const ph = IS_PORTRAIT ? H - 32    : H - 60;

  ctx.save();
  /* 暗幕 */
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);
  /* パネル */
  roundRect(px, py, pw, ph, 12);
  ctx.fillStyle = 'rgba(8,40,15,0.97)'; ctx.fill();
  ctx.strokeStyle = Y; ctx.lineWidth = 2; ctx.stroke();

  /* タイトル */
  const titleH = IS_PORTRAIT ? 38 : 48;
  ctx.font = `bold ${IS_PORTRAIT ? 18 : 24}px 'Hiragino Mincho ProN',serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = Y;
  ctx.fillText('🏆 実績一覧', px + pw/2, py + titleH/2);
  /* 区切り線 */
  ctx.beginPath();
  ctx.moveTo(px+16, py+titleH); ctx.lineTo(px+pw-16, py+titleH);
  ctx.strokeStyle = 'rgba(245,208,32,0.3)'; ctx.lineWidth=1; ctx.stroke();

  /* ── レイアウト計算 ── */
  const listY  = py + titleH + 4;
  const footH  = 22;
  const listH  = ph - titleH - 4 - footH;
  const COL    = IS_PORTRAIT ? 1 : 2;
  const ROWS   = Math.ceil(ACHIEVEMENTS.length / COL);
  const rowH   = IS_PORTRAIT ? Math.floor(listH / ACHIEVEMENTS.length)
                              : Math.floor(listH / ROWS);
  const colW   = Math.floor((pw - 8) / COL);

  /* PC版: 中央縦区切り線 */
  if (!IS_PORTRAIT) {
    ctx.beginPath();
    ctx.moveTo(px + 4 + colW, listY); ctx.lineTo(px + 4 + colW, listY + rowH * ROWS);
    ctx.strokeStyle = 'rgba(245,208,32,0.15)'; ctx.lineWidth=1; ctx.stroke();
  }

  /* クリップ（リスト範囲内のみ描画） */
  ctx.save();
  ctx.beginPath();
  ctx.rect(px, listY, pw, listH);
  ctx.clip();

  /* リスト */
  ACHIEVEMENTS.forEach((ach, i) => {
    const col = IS_PORTRAIT ? 0 : Math.floor(i / ROWS);
    const row = IS_PORTRAIT ? i : i % ROWS;
    const lx  = px + 4 + col * colW;
    const ry  = listY + row * rowH;
    const mid = ry + rowH / 2;
    const unlocked = !!unlockedAch[ach.id];

    /* 交互背景 */
    if (row % 2 === 0) {
      roundRect(lx+1, ry+1, colW-2, rowH-2, 3);
      ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.fill();
    }

    ctx.globalAlpha = unlocked ? 1 : 0.35;

    /* ステータス丸 */
    const circR = IS_PORTRAIT ? 8 : 9;
    const circX = lx + (IS_PORTRAIT ? 16 : 18);
    ctx.beginPath();
    ctx.arc(circX, mid, circR, 0, Math.PI*2);
    ctx.fillStyle   = unlocked ? '#2ecc40' : 'rgba(120,120,120,0.5)'; ctx.fill();
    ctx.strokeStyle = unlocked ? '#27ae35' : 'rgba(160,160,160,0.4)';
    ctx.lineWidth = 1.4; ctx.stroke();
    if (unlocked) {
      ctx.beginPath();
      ctx.moveTo(circX-4, mid); ctx.lineTo(circX-1, mid+4); ctx.lineTo(circX+5, mid-4);
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(circX, mid-3); ctx.lineTo(circX, mid+3);
      ctx.strokeStyle='rgba(200,200,200,0.7)'; ctx.lineWidth=1.8; ctx.stroke();
    }

    /* アイコン */
    const iconX  = lx + (IS_PORTRAIT ? 32 : 34);
    const textX  = lx + (IS_PORTRAIT ? 52 : 56);
    const nameFs = IS_PORTRAIT ? 13 : 13;
    const descFs = IS_PORTRAIT ? 11 : 11;
    const nameOY = IS_PORTRAIT ? -7 : -7;
    const descOY = IS_PORTRAIT ?  7 :  7;

    ctx.fillStyle='#ffffff';
    ctx.font=`${IS_PORTRAIT ? 15 : 16}px serif`;
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(ach.icon, iconX, mid);

    /* 実績名 */
    ctx.font=`bold ${nameFs}px 'Hiragino Mincho ProN',serif`;
    ctx.fillStyle = unlocked ? Y : 'rgba(245,208,32,0.5)';
    ctx.fillText(ach.name, textX, mid + nameOY);

    /* 説明文 */
    ctx.font=`${descFs}px 'Hiragino Mincho ProN',serif`;
    ctx.fillStyle = unlocked ? 'rgba(255,255,255,0.75)' : 'rgba(255,255,255,0.28)';
    ctx.fillText(ach.desc, textX, mid + descOY);

    ctx.globalAlpha = 1;
  });

  ctx.restore(); // クリップ解除

  /* 解除数 */
  const cnt = ACHIEVEMENTS.filter(a => !!unlockedAch[a.id]).length;
  ctx.font = `${IS_PORTRAIT ? 11 : 11}px 'Hiragino Mincho ProN',serif`;
  ctx.textAlign='right'; ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(245,208,32,0.45)';
  ctx.fillText(`${cnt} / ${ACHIEVEMENTS.length} 解除済み`, px+pw-12, py+ph-6);

  ctx.restore();
}

  ctx.restore();

/* startup フェーズ: lsLoad/lsLoadAch だけ行い、画面は startup のままにする */

lsLoad();        // bet もここで復元される
lsLoadAch();
lsLoadStats();
if (!BET_OPTIONS.includes(bet)) bet = 1; // 未保存時のみデフォルト1
isGameOver = false;
phase = 'startup';
wheels = WXS.map((x, i) => createWheel(x, WYS[i])); // ホイールだけ初期化（背景描画用）
particles = [];

(function loop(){ update(); draw(); requestAnimationFrame(loop); })();

function onShoot(){
  /* idle と reach の両フェーズで矢を放てる */
  if (phase!=='idle' && phase!=='reach') return;
  if (curIdx>=4) return;
  if (shootGuard > 0) return; // init直後の誤射ブロック
  /* 最初の矢: ベット確定 & コイン消費 & 実績 */
  if (curIdx === 0) {
    if (coins < bet) return; // 念のため
    betLocked = true;
    coins -= bet;
    unlockAch('first_shot');
    if (bet >= 100) unlockAch('bet_max');
    /* プレイ回数カウント */
    playCount++;
    if (playCount >= 100) unlockAch('play_10');
    if (playCount >= 500) unlockAch('play_50');
    lsSaveStats();
  }
  /* 矢数カウント */
  shotCount++;
  if (shotCount >= 1000) unlockAch('shot_100');
  lsSaveStats();
  const w=wheels[curIdx];
  w.result=hitResult(w); w.locked=true;
  phase='shooting';
  playSE('shoot');
  arrowProgress=0;
  if (IS_PORTRAIT) {
    arrowSX=-40; arrowSY=w.y; arrowTX=w.x+WR+5; arrowTY=w.y;
  } else {
    arrowSX=W/2; arrowSY=H+30; arrowTX=w.x; arrowTY=w.y-WR-5;
  }
}
const CHEAT_MAP = { 'KeyG':'ギ', 'KeyY':'ヨ', 'KeyU':'ウ', 'KeyZ':'ザ' };

function cheatShoot(char) {
  if (phase!=='idle'||curIdx>=4) return;
  const w = wheels[curIdx];
  const s = w.segs.find(seg => seg.char === char);
  if (!s) return;
  /* ポインタ位置にセグメント中央が来るよう回転を強制 */
  w.rot = (IS_PORTRAIT ? 0 : -Math.PI/2) - s.start - s.span/2;
  onShoot();
}

document.addEventListener('keydown', e=>{
  if (phase === 'startup') {
    if (e.code === 'Space') { e.preventDefault(); initGame(); }
    return;
  }
  if (showAchievements) {
    e.preventDefault(); showAchievements = false; return;
  }
  if (e.code==='Space') {
    e.preventDefault();
    if (phase==='done'&&canRestart) {
      if (isGameOver) gameOverReset(); else init();
    } else {
      onShoot();
    }
    return;
  }
  /* カーソル左右でBET変更 */
  if ((e.code==='ArrowLeft'||e.code==='ArrowRight') && !betLocked && (phase==='idle'||phase==='reach')) {
    e.preventDefault();
    changeBet(e.code==='ArrowLeft' ? -1 : +1);
    return;
  }
  if (CHEAT_MAP[e.code] && phase==='idle' && curIdx<4) {
    e.preventDefault();
    cheatShoot(CHEAT_MAP[e.code]);
  }
});

canvas.addEventListener('mousedown', e=>{
  if (e.button !== 0) return;
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (W / rect.width);
  const cy = (e.clientY - rect.top)  * (H / rect.height);
  if (phase === 'startup') {
    if (hitTest(ACH_TROPHY, cx, cy)) { showAchievements = !showAchievements; return; }
    if (hitTest(MUTE_BTN, cx, cy)) { if (!audioCtx) getAudioCtx(); toggleMute(); return; }
    if (showAchievements) { showAchievements = false; return; }
    if (hitTest(STARTUP_BTN, cx, cy)) { initGame(); return; }
    return;
  }
  if (showAchievements) { showAchievements = false; return; }
  if (hitTest(ACH_TROPHY, cx, cy)) { showAchievements = true; return; }
  if (hitTest(MUTE_BTN, cx, cy)) {
    /* AudioContextがなければ初期化してからミュート切り替え */
    if (!audioCtx) getAudioCtx();
    toggleMute(); return;
  }
  /* ベット◀▶ボタン（縦画面 or PCボトムバー） */
  if (!betLocked && (phase==='idle'||phase==='reach')) {
    const decBtn = IS_PORTRAIT ? P_BET_DEC_BTN : BET_DEC_BTN;
    const incBtn = IS_PORTRAIT ? P_BET_INC_BTN : BET_INC_BTN;
    if (decBtn && hitTest(decBtn, cx, cy)) { changeBet(-1); return; }
    if (incBtn && hitTest(incBtn, cx, cy)) { changeBet(+1); return; }
  }
  if (phase==='done'&&canRestart) {
    if (isGameOver) gameOverReset(); else init();
  } else {
    onShoot();
  }
});

/* タッチ操作対応（ページ内どこでもタップで反応） */
document.addEventListener('touchstart', e=>{
  if (e.target.closest('#fs-btn')) return;
  e.preventDefault();
  const pt = touchToCanvas(e.touches[0]);

  if (phase === 'startup') {
    if (hitTest(ACH_TROPHY, pt.x, pt.y)) { showAchievements = !showAchievements; return; }
    if (hitTest(MUTE_BTN, pt.x, pt.y)) { if (!audioCtx) getAudioCtx(); toggleMute(); return; }
    if (showAchievements) { showAchievements = false; return; }
    if (hitTest(STARTUP_BTN, pt.x, pt.y)) { initGame(); return; }
    return;
  }
  /* 実績オーバーレイ中 */
  if (showAchievements) { showAchievements = false; return; }
  /* トロフィーボタン */
  if (hitTest(ACH_TROPHY, pt.x, pt.y)) { showAchievements = true; return; }

  /* ミュートボタン */
  if (hitTest(MUTE_BTN, pt.x, pt.y)) {
    if (!audioCtx) getAudioCtx();
    toggleMute(); return;
  }

  /* スマホ: ベット◀▶ボタン */
  if (!betLocked && (phase==='idle'||phase==='reach')) {
    const decBtn = IS_PORTRAIT ? P_BET_DEC_BTN : BET_DEC_BTN;
    const incBtn = IS_PORTRAIT ? P_BET_INC_BTN : BET_INC_BTN;
    if (decBtn && hitTest(decBtn, pt.x, pt.y)) { changeBet(-1); return; }
    if (incBtn && hitTest(incBtn, pt.x, pt.y)) { changeBet(+1); return; }
  }

  if (phase==='done'&&canRestart) {
    if (isGameOver) gameOverReset(); else init();
  } else {
    onShoot();
  }
}, { passive: false });

/* ── キャンバスをビューポートに合わせてスケール ── */
function fitCanvas() {
  /* visualViewport はブラウザUIを除いた実際の表示領域を返す
     iOS Safari のアドレスバー・タブバーがある場合も正確なサイズが得られる */
  const vv     = window.visualViewport;
  const vpW    = vv ? vv.width  : document.documentElement.clientWidth;
  const vpH    = vv ? vv.height : document.documentElement.clientHeight;

  const h1El   = document.querySelector('h1');
  const titleH = (h1El && getComputedStyle(h1El).display !== 'none')
    ? h1El.getBoundingClientRect().height + 6 : 0;
  const MARGIN = 8;
  const scale  = Math.min((vpW - MARGIN * 2) / W, (vpH - MARGIN * 2 - titleH) / H);
  canvas.style.width  = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';

  /* 全画面ボタンの位置・サイズを canvas 座標に同期
     display チェックなしで常に計算し、表示時に正しい位置になるようにする */
  const fsEl = document.getElementById('fs-btn');
  if (fsEl) {
    fsEl.style.left   = Math.round(FS_BTN_RECT.x * scale) + 'px';
    fsEl.style.top    = Math.round(FS_BTN_RECT.y * scale) + 'px';
    fsEl.style.width  = Math.round(FS_BTN_RECT.w * scale) + 'px';
    fsEl.style.height = Math.round(FS_BTN_RECT.h * scale) + 'px';
    fsEl.style.right  = '';
  }
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', () => setTimeout(() => location.reload(), 300));
/* visualViewport のリサイズ（アドレスバー出現・消滅）にも追従 */
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', fitCanvas);
}
fitCanvas();

/* ── 全画面ボタン（Fullscreen API 対応環境のみ表示） ── */
const fsBtn = document.getElementById('fs-btn');
const FS_SUPPORTED = !!(document.fullscreenEnabled || document.webkitFullscreenEnabled);

/* SVGアイコン: Material Design fullscreen / fullscreen_exit */
const FS_SVG_ENTER = `<svg viewBox="0 0 24 24" width="20" height="20" fill="#f5d020" xmlns="http://www.w3.org/2000/svg">
  <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
</svg>`;
const FS_SVG_EXIT  = `<svg viewBox="0 0 24 24" width="20" height="20" fill="#f5d020" xmlns="http://www.w3.org/2000/svg">
  <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
</svg>`;

if (FS_SUPPORTED) {
  fsBtn.style.display = 'flex';
  fsBtn.innerHTML = FS_SVG_ENTER;
  fitCanvas(); // 表示ON後に位置を再計算

  function toggleFullscreen() {
    const el = document.documentElement;
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      const req = el.requestFullscreen || el.webkitRequestFullscreen;
      if (req) req.call(el).catch(()=>{});
    } else {
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (exit) exit.call(document).catch(()=>{});
    }
  }

  fsBtn.addEventListener('click', e => { e.stopPropagation(); toggleFullscreen(); });
  fsBtn.addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation(); toggleFullscreen();
  }, { passive: false });

  function onFsChange() {
    const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    fsBtn.innerHTML = inFs ? FS_SVG_EXIT : FS_SVG_ENTER;
    setTimeout(fitCanvas, 150);
  }
  document.addEventListener('fullscreenchange', onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);
}
</script>
