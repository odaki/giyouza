  const decRect = P_BET_DEC_BTN;  // { x:27, y:747, w:84, h:36 }
  const incRect = P_BET_INC_BTN;  // { x:309, y:747, w:84, h:36 }

  /* ボタン: 確定中またはスローランプ中は両方とも非活性 */
  const _betRampLockedP = slowRampEndTime > 0 && audioCtx && audioCtx.currentTime < slowRampEndTime;
  const canDec = !betLocked && !_betRampLockedP && (phase==='idle'||phase==='reach') && _cachedBetIdx > 0;
  const canInc = !betLocked && !_betRampLockedP && (phase==='idle'||phase==='reach') &&
    _cachedBetIdx < BET_OPTIONS.length - 1 && BET_OPTIONS[_cachedBetIdx + 1] <= coins;
  _drawBetBtn(decRect, '◀', canDec, 22);
  _drawBetBtn(incRect, '▶', canInc, 22);

  /* 中央: "BET" ＋ 数字 横並び（合計幅で中央揃え） */
  const cx = W / 2, cy = btnY + btnH / 2;
  ctx.textBaseline = 'middle';
  const gap = 8;
  const wBet = _cachedBetLabelW;  // 事前計測済み
  const wNum = _cachedBetNumW;    // bet変化時のみ再計測済み
  const totalW = wBet + gap + wNum;
  const startX = cx - totalW / 2;
  ctx.fillStyle = Y;
  ctx.textAlign = 'left';
  ctx.font = `bold 24px 'Hiragino Mincho ProN',serif`;
  ctx.fillText('BET', startX, cy);
  ctx.font = `bold 42px 'Hiragino Mincho ProN',serif`;
  ctx.fillText(_cachedBetStr, startX + wBet + gap, cy);

  /* バージョン */
  ctx.font = '9px monospace'; ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
  ctx.fillStyle = 'rgba(245,208,32,0.18)';
  ctx.fillText(VERSION, P_BAR_X + P_BAR_W - 4, P_BAR_Y + P_BAR_H - 4);
  ctx.restore();
}

/* ── 縦画面専用: 弓の描画 ── */
function drawBow() {
  /* 弦が左(射手側)、弓本体が右(的方向)に膨らむ正しい向き
     弦の両端 = (bx, by±38)、弓の腹 = bx + bulge の位置 */
  const bx = 30, by = WYS[curIdx];
  const bulge = 28; // 的方向への膨らみ量
  ctx.save();

  /* ── 矢を番えて引き絞った状態 ──
     弓: bx を中心に右(的方向)へ膨らむ ")" 形
     弦: 上端(bx,by-span)→筈(nockX,by)→下端(bx,by+span) のくの字
     矢: 筈(nockX) から右へ伸び、矢羽は筈の直前(矢先側)に配置
         ※ 羽は絶対に nockX より左(弦より奥)には出ない             */
  const pull     = 17;   // 弦の引き量(px)
  const halfSpan = 42;   // 弓の半張り
  const nockX    = bx - pull;          // 筈X = 弦の最も引かれた点
  const tipX     = nockX + 74;         // 矢先X

  /* 弓本体 */
  ctx.beginPath();
  ctx.moveTo(bx, by - halfSpan);
  ctx.quadraticCurveTo(bx + bulge, by, bx, by + halfSpan);
  ctx.strokeStyle = '#7a3a0a'; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
  /* 弓ハイライト */
  ctx.beginPath();
  ctx.moveTo(bx + 1, by - halfSpan + 4);
  ctx.quadraticCurveTo(bx + bulge - 5, by, bx + 1, by + halfSpan - 4);
  ctx.strokeStyle = 'rgba(180,100,30,0.4)'; ctx.lineWidth = 2; ctx.stroke();

  /* 弦 (くの字: 上端→筈→下端) */
  ctx.beginPath();
  ctx.moveTo(bx, by - halfSpan);
  ctx.lineTo(nockX, by);
  ctx.lineTo(bx, by + halfSpan);
  ctx.strokeStyle = 'rgba(220,190,80,0.92)'; ctx.lineWidth = 1.6; ctx.lineCap = 'round'; ctx.stroke();

  /* ── 矢 ── */
  if (phase === 'idle' || phase === 'reach') {
    /* 矢柄 */
    ctx.beginPath();
    ctx.moveTo(nockX, by);
    ctx.lineTo(tipX - 12, by);
    ctx.strokeStyle = '#c08840'; ctx.lineWidth = 2.2; ctx.lineCap = 'butt'; ctx.stroke();

    /* 矢先 (鋭い三角形) */
    ctx.beginPath();
    ctx.moveTo(tipX,      by);
    ctx.lineTo(tipX - 13, by - 5);
    ctx.lineTo(tipX - 13, by + 5);
    ctx.closePath();
    ctx.fillStyle = '#2a3040'; ctx.fill();

    /* 矢羽: 平行四辺形
       下辺(軸側): vB → vF (矢柄上)
       上辺(外側): 下辺をそのまま筈方向へ shift ずらした辺
       → 横長の長方形を傾けたような不等辺平行四辺形             */
    const vB    = nockX + 3;  // 下辺・後端X
    const vF    = nockX + 13; // 下辺・前端X
    const vH    = 6;          // 羽の張り出し高さ
    const shift = 5;          // 上辺を筈側(左)へずらす量

    for (const s of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(vB,         by);          // 下辺・後端 (軸上)
      ctx.lineTo(vF,         by);          // 下辺・前端 (軸上)
      ctx.lineTo(vF - shift, by + s*vH);  // 上辺・前端 (外側)
      ctx.lineTo(vB - shift, by + s*vH);  // 上辺・後端 (外側)
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,255,0.93)'; ctx.fill();
      ctx.strokeStyle = 'rgba(160,160,160,0.5)'; ctx.lineWidth = 0.8; ctx.stroke();
    }

    /* 筈の印 (小さい暗色リング) */
    ctx.beginPath();
    ctx.arc(nockX + 1, by, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#5a3010'; ctx.fill();
  }
  ctx.restore();
}

/* タッチ座標をキャンバス座標に変換 */
function touchToCanvas(touch) {
  return {
    x: (touch.clientX - _canvasRect.left) * (W / _canvasRect.width),
    y: (touch.clientY - _canvasRect.top)  * (H / _canvasRect.height),
  };
}

/* ── エンド画面: オーバーレイのみ ── */
/* ── リーチ演出: スポットライトオーバーレイ ── */
function drawReachOverlay() {
  const fadeIn = Math.min(1, reachTimer / 35);
  const wx = WXS[3], wy = WYS[3];

  ctx.save();

  /* 暗幕 */
  ctx.fillStyle = `rgba(0,0,0,${0.58 * fadeIn})`;
  ctx.fillRect(0, 0, W, H);

  /* スポットライト (第4ホイール中心に明るい円) */
  const pulse = 0.65 + 0.35 * Math.abs(Math.sin(reachTimer * 0.13));
  const spot  = ctx.createRadialGradient(wx, wy, 0, wx, wy, WR * 2.6);
  spot.addColorStop(0,   `rgba(245,208,32,${0.22 * pulse * fadeIn})`);
  spot.addColorStop(0.5, `rgba(245,208,32,${0.10 * pulse * fadeIn})`);
  spot.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = spot;
  ctx.fillRect(0, 0, W, H);

  /* 減速が完了したらホイール枠をフリッカー */
  if (reachTimer > REACH_DECEL_FRAMES) {
    const flicker = Math.floor(reachTimer / 8) % 2 === 0 ? 1 : 0.5;
    ctx.beginPath();
    ctx.arc(wx, wy, WR + 8, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(245,208,32,${0.7 * flicker * fadeIn})`;
    ctx.lineWidth = 4;
    ctx.shadowColor = Y;
    ctx.shadowBlur  = 20;
    ctx.stroke();
  }

  ctx.restore();
}

/* ── リーチ演出: テキスト ── */
function drawReachText() {
  const fadeIn = Math.min(1, Math.max(0, (reachTimer - 18) / 28));
  if (fadeIn <= 0) return;

  ctx.save();

  /* 「リーチ！」*/
  const pulse = 1 + 0.055 * Math.sin(reachTimer * 0.2);
  ctx.globalAlpha = fadeIn;
  ctx.save();
  ctx.translate(W / 2, 78);
  ctx.scale(pulse, pulse);
  ctx.font = `bold 58px 'Hiragino Mincho ProN',serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor  = Y;
  ctx.shadowBlur   = 45;
  outText('リーチ！', 0, 0, Y, 'rgba(0,0,0,0.92)', 10);
  ctx.restore();

  /* 減速完了後: 操作を促すサブテキスト */
  if (reachTimer > REACH_DECEL_FRAMES) {
    const blink = 0.45 + 0.45 * Math.sin(reachTimer * 0.15);
    ctx.globalAlpha = blink * fadeIn;
    ctx.font = `bold 22px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = Y; ctx.shadowBlur = 18;
    const msg = IS_TOUCH ? '[ タップ ] で矢を放て！' : '[ スペース ] で矢を放て！';
    outText(msg, W / 2, 125, '#fffde7', 'rgba(0,0,0,0.85)', 5);
  }

  /* 第4的の上に▼マーカー (注目を誘導) */
  const markerAlpha = fadeIn * (0.5 + 0.5 * Math.abs(Math.sin(reachTimer * 0.25)));
  ctx.globalAlpha = markerAlpha;
  ctx.font = `bold 20px sans-serif`;
  ctx.textAlign = 'center';
  ctx.shadowColor = Y; ctx.shadowBlur = 15;
  ctx.fillStyle = Y;
  if (IS_PORTRAIT) ctx.fillText('◀', WXS[3] + WR + 52, WYS[3]); // 右側に◀
  else             ctx.fillText('▼', WXS[3], WYS[3] - WR - 52);

  ctx.restore();
}

/* ── ハズレポップアップ（複数同時表示対応） ── */
function drawMissPopup() {
  if (missPopups.length === 0) return;
  const TOTAL = 120;
  ctx.save();
  ctx.font = `bold 36px 'Hiragino Mincho ProN',serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#cc2200'; ctx.shadowBlur = 20;
  for (const p of missPopups) {
    const elapsed = TOTAL - p.timer;
    const t       = elapsed / TOTAL;            // 0→1
    const fadeIn  = Math.min(1, elapsed / 15);
    const fadeOut = p.timer < 70 ? p.timer / 70 : 1; // 後半58%をかけてフェードアウト
    const alpha   = fadeIn * fadeOut;
    const popY    = H / 2 + (0.5 - t) * 90;    // 移動範囲の中心がH/2になるよう配置
    ctx.globalAlpha = alpha * 0.92;
    outText(`－${fmt(p.amt)} ギヨウザ`, W / 2, popY, '#ff7755', 'rgba(0,0,0,0.85)', 6);
  }
  ctx.restore();
}

function drawPayoutPopup() {
  if (payoutPopups.length === 0) return;
  const TOTAL = 150;
  ctx.save();
  ctx.font = `bold 42px 'Hiragino Mincho ProN',serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 30;
  for (const p of payoutPopups) {
    const pt      = p.timer / TOTAL;
    const elapsed = TOTAL - p.timer;
    const fadeIn  = Math.min(1, elapsed / 15);
    const fadeOut = pt < 0.2 ? pt / 0.2 : 1;
    const alpha   = fadeIn * fadeOut;
    const popY    = H / 2 - 60 - (1 - pt) * 30;
    ctx.globalAlpha = alpha * 0.95;
    outText(`＋${fmt(p.amt)}ギヨウザ！`, W / 2, popY, '#ffee44', 'rgba(0,0,0,0.9)', 8);
  }
  ctx.restore();
}

function drawEndOverlay() {
  const alpha = Math.min(1,(endTimer-45)/35);
  /* 大当たりはギヨウザを見せるため薄め、ウザウザも半透明 */
  const overlayAlpha = hitType==='jackpot'  ? alpha*0.48
                     : hitType==='uzauza'   ? alpha*0.55
                     : hitType==='giugiu'   ? alpha*0.30
                     : hitType==='yoyoyoyo' ? alpha*0.65
                     : hitType==='uuuu'     ? alpha*0.72
                     : hitType==='zazazaza' ? alpha*0.60
                     : alpha*0.78;
  ctx.fillStyle=`rgba(5,25,10,${overlayAlpha})`;
  ctx.fillRect(0,0,W,H);
}

/* ── エンド画面: テキスト最前面 ── */
function drawEndScreen() {
  ctx.save();
  const alpha=Math.min(1,(endTimer-45)/35);
  if (alpha<0.6){ctx.restore();return;}

  const cy=H/2-25;
  /* 縦画面(W=420)は横画面(W=1060)基準のフォントサイズをスケールダウン
     「超大当たり！！」は7文字のため幅制約が厳しく個別に小さめのスケールを使用 */
  const _fsc  = IS_PORTRAIT ? 0.90 : 1.0; // 通常テキスト用
  const _fscR = IS_PORTRAIT ? 0.68 : 1.0; // 超大当たり！！タイトル用（7文字）
  const _fs   = s => Math.round(s * _fsc);
  const _fsR  = s => Math.round(s * _fscR);
  const _fy   = y => Math.round(y * _fsc);

  /* ━━ 大当たり ━━ */
  if (hitType === 'jackpot') {
    for (const c of CLOUDS) drawCloud(c.x,c.y,c.s*1.2,Math.min(0.9,c.a+0.2),c.r);

    if (isReachJackpot) {
      /* ── リーチ経由: 虹色・大型・激しいパルス ── */
      const pulse = 1 + 0.12 * Math.sin(endTimer * 0.18);
      ctx.save(); ctx.translate(W/2, cy); ctx.scale(pulse, pulse);

      /* 虹色の大光輪 */
      const haloR = ctx.createRadialGradient(0,0,_fsR(30),0,0,_fsR(280));
      const hue = (endTimer * 2) % 360;
      haloR.addColorStop(0,   `hsla(${hue},100%,70%,0.45)`);
      haloR.addColorStop(0.5, `hsla(${(hue+120)%360},100%,60%,0.2)`);
      haloR.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = haloR;
      ctx.beginPath(); ctx.arc(0,0,_fsR(280),0,Math.PI*2); ctx.fill();

      /* 虹色グラデーションテキスト */
      ctx.font = `bold ${_fsR(96)}px 'Hiragino Mincho ProN',serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const grad = ctx.createLinearGradient(-_fsR(200),0,_fsR(200),0);
      grad.addColorStop(0,   `hsl(${hue},100%,65%)`);
      grad.addColorStop(0.25,`hsl(${(hue+60)%360},100%,65%)`);
      grad.addColorStop(0.5, `hsl(${(hue+120)%360},100%,65%)`);
      grad.addColorStop(0.75,`hsl(${(hue+200)%360},100%,65%)`);
      grad.addColorStop(1,   `hsl(${(hue+300)%360},100%,65%)`);
      ctx.shadowColor = '#fff'; ctx.shadowBlur = 60;
      outText('超大当たり！！',0,0, grad, 'rgba(0,0,0,0.92)', _fsR(13));
      ctx.shadowBlur = 22;
      ctx.font = `bold ${_fs(36)}px 'Hiragino Mincho ProN',serif`;
      outText('リーチ達成！ ギ ヨ ウ ザ',0,_fy(92), '#ffffff', 'rgba(0,0,0,0.88)', _fs(8));
      ctx.restore();

    } else {
      /* ── 通常大当たり ── */
      const pulse=1+0.06*Math.sin(endTimer*0.12);
      ctx.save(); ctx.translate(W/2,cy); ctx.scale(pulse,pulse);
      const halo=ctx.createRadialGradient(0,0,_fs(20),0,0,_fs(230));
      halo.addColorStop(0,'rgba(245,208,32,0.4)'); halo.addColorStop(1,'rgba(245,208,32,0)');
      ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(0,0,_fs(230),0,Math.PI*2); ctx.fill();
      ctx.font=`bold ${_fs(88)}px 'Hiragino Mincho ProN',serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor=Y; ctx.shadowBlur=55;
      outText('大当たり！',0,0, Y, 'rgba(0,0,0,0.9)', _fs(11));
      ctx.shadowBlur=20;
      ctx.font=`bold ${_fs(32)}px 'Hiragino Mincho ProN',serif`;
      outText('ギ ヨ ウ ザ 達成！',0,_fy(80), '#fffde7', 'rgba(0,0,0,0.85)', _fs(7));
      ctx.restore();
    }

  /* ━━ ギザギザ 中当たり ━━ */
  } else if (hitType === 'gizagiza') {
    const pulse=1+0.05*Math.sin(endTimer*0.10);
    ctx.save(); ctx.translate(W/2,cy); ctx.scale(pulse,pulse);
    ctx.font=`bold ${_fs(78)}px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#c0d8f0'; ctx.shadowBlur=50;
    outText('中当たり！',0,0, '#c0d8f0', 'rgba(0,20,60,0.9)', _fs(10));
    ctx.shadowBlur=20;
    ctx.font=`bold ${_fs(38)}px 'Hiragino Mincho ProN',serif`;
    outText('ギ ザ ギ ザ',0,_fy(78), '#e8f4ff', 'rgba(0,20,60,0.85)', _fs(7));
    ctx.restore();

  /* ━━ ウヨウヨ 中当たり ━━ */
  } else if (hitType === 'uyouyo') {
    ctx.save(); ctx.translate(W/2,cy);
    ctx.font=`bold ${_fs(78)}px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#7ec850'; ctx.shadowBlur=50;
    outText('中当たり！',0,0, '#aaee66', 'rgba(0,40,0,0.9)', _fs(10));
    ctx.shadowBlur=20;
    ctx.font=`bold ${_fs(38)}px 'Hiragino Mincho ProN',serif`;
    outText('ウ ヨ ウ ヨ',0,_fy(78), '#ccff88', 'rgba(0,40,0,0.85)', _fs(7));
    ctx.restore();

  /* ━━ ウザウザ 中当たり ━━ */
  } else if (hitType === 'uzauza') {
    ctx.save(); ctx.translate(W/2,cy);
    const wobbleX=Math.sin(endTimer*2.1)*4, wobbleY=Math.cos(endTimer*1.7)*3;
    ctx.translate(wobbleX,wobbleY);
    ctx.font=`bold ${_fs(78)}px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#ff6600'; ctx.shadowBlur=40;
    outText('中当たり！',0,0, '#ffaa00', 'rgba(60,0,0,0.9)', _fs(10));
    ctx.shadowBlur=15;
    ctx.font=`bold ${_fs(38)}px 'Hiragino Mincho ProN',serif`;
    outText('ウ ザ ウ ザ',0,_fy(78), '#ffcc44', 'rgba(60,0,0,0.85)', _fs(7));
    ctx.restore();

  /* ━━ ギウギウ 中当たり ━━ */
  } else if (hitType === 'giugiu') {
    const squeeze = 1 - Math.abs(Math.sin(endTimer*0.08))*0.08;
    ctx.save(); ctx.translate(W/2,cy); ctx.scale(1, squeeze);
    ctx.font=`bold ${_fs(78)}px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#f5d020'; ctx.shadowBlur=45;
    outText('中当たり！',0,0, '#f5d020', 'rgba(0,0,0,0.9)', _fs(10));
    ctx.shadowBlur=18;
    ctx.font=`bold ${_fs(38)}px 'Hiragino Mincho ProN',serif`;
    outText('ギ ウ ギ ウ',0,_fy(78), '#fffde7', 'rgba(0,0,0,0.85)', _fs(7));
    ctx.restore();

  /* ━━ ギギギギ 中当たり ━━ */
  } else if (hitType === 'gigigigi') {
    /* ガタガタ揺れる */
    const jx = (Math.random()-0.5)*6, jy = (Math.random()-0.5)*4;
    ctx.save(); ctx.translate(W/2+jx, cy+jy);
    ctx.font=`bold ${_fs(78)}px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#aaddff'; ctx.shadowBlur=40;
    outText('中当たり！',0,0, '#ddeeff', 'rgba(0,0,20,0.92)', _fs(10));
    ctx.shadowBlur=18;
    ctx.font=`bold ${_fs(38)}px 'Hiragino Mincho ProN',serif`;
    outText('ギ ギ ギ ギ',0,_fy(78), '#ffffff', 'rgba(0,0,20,0.88)', _fs(7));
    ctx.restore();

  /* ━━ ヨヨヨヨ 中当たり ━━ */
  } else if (hitType === 'yoyoyoyo') {
    /* 上下にわずかに弾む */
    const bounce = Math.abs(Math.sin(endTimer*0.15)) * 8;
    ctx.save(); ctx.translate(W/2, cy + bounce);
    ctx.font=`bold ${_fs(78)}px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#44ddcc'; ctx.shadowBlur=45;
    outText('中当たり！',0,0, '#55eedd', 'rgba(0,30,30,0.92)', _fs(10));
    ctx.shadowBlur=18;
    ctx.font=`bold ${_fs(38)}px 'Hiragino Mincho ProN',serif`;
    outText('ヨ ヨ ヨ ヨ',0,_fy(78), '#aaffee', 'rgba(0,30,30,0.88)', _fs(7));
    ctx.restore();

  /* ━━ ウウウウ 中当たり ━━ */
  } else if (hitType === 'uuuu') {
    /* ゆらゆら漂う */
    const fx = Math.sin(endTimer*0.04)*5, fy = Math.cos(endTimer*0.03)*3;
    ctx.save(); ctx.translate(W/2+fx, cy+fy);
    ctx.font=`bold ${_fs(78)}px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#aaccff'; ctx.shadowBlur=55;
    outText('中当たり！',0,0, '#cce8ff', 'rgba(0,10,40,0.92)', _fs(10));
    ctx.shadowBlur=20;
    ctx.font=`bold ${_fs(38)}px 'Hiragino Mincho ProN',serif`;
    outText('ウ ウ ウ ウ',0,_fy(78), '#e8f4ff', 'rgba(0,10,40,0.88)', _fs(7));
    ctx.restore();

  /* ━━ ザザザザ 中当たり ━━ */
  } else if (hitType === 'zazazaza') {
    ctx.save(); ctx.translate(W/2, cy);
    ctx.font=`bold ${_fs(78)}px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#66aaff'; ctx.shadowBlur=45;
    outText('中当たり！',0,0, '#88ccff', 'rgba(0,10,40,0.92)', _fs(10));
    ctx.shadowBlur=18;
    ctx.font=`bold ${_fs(38)}px 'Hiragino Mincho ProN',serif`;
    outText('ザ ザ ザ ザ',0,_fy(78), '#bbddff', 'rgba(0,10,40,0.88)', _fs(7));
    ctx.restore();

  /* ━━ ギョギョ 中当たり ━━ */
  } else if (hitType === 'gyogyo') {
    /* ビクビク揺れる驚き演出 */
    const shock = (Math.random() - 0.5) * 5;
    const scaleX = 1 + Math.sin(endTimer * 0.22) * 0.04;
    ctx.save(); ctx.translate(W/2 + shock, cy); ctx.scale(scaleX, 1);
    ctx.font=`bold ${_fs(78)}px 'Hiragino Mincho ProN',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#ffcc00'; ctx.shadowBlur=55;
    outText('中当たり！',0,0, '#ffee44', 'rgba(40,20,0,0.92)', _fs(10));
    ctx.shadowBlur=20;
    ctx.font=`bold ${_fs(38)}px 'Hiragino Mincho ProN',serif`;
    outText('ギョ ギョ ！',0,_fy(78), '#ffe066', 'rgba(40,20,0,0.88)', _fs(7));
    ctx.restore();

  /* ━━ ハズレ: drawMissPopup() で描画 ━━ */
  } else { /* miss */ }

  /* 獲得ポップアップは常時描画ブロック（drawPayoutPopup）で描画 */

  /* ゲームオーバー */
  if (isGameOver) {
    ctx.save();

    /* 赤い暗幕（フェードイン） */
    ctx.globalAlpha = alpha * 0.72;
    ctx.fillStyle = 'rgba(60,0,0,1)';
    ctx.fillRect(0, 0, W, H);


    /* タイトルテキスト（ゆらゆら揺れる） */
    const shake = endTimer > 10 ? 0 : (10 - endTimer) * 1.5;
    const sx = (Math.random() - 0.5) * shake;
    const sy = (Math.random() - 0.5) * shake;
    ctx.globalAlpha = alpha;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 50;
    if (IS_PORTRAIT) {
      /* 縦画面は幅420pxのため2行に分割
         行間0.3行分（行高44px × 1.3 = 57px間隔）
         描画順: 下行→上行で「ギヨウザが」を前面に */
      const goFs   = 44;
      const goLine = Math.round(goFs * 1.3); // 行中心間距離 ≈ 57px
      const goY1   = H / 2 - goLine / 2 - 30;    // 「ギヨウザが」中心（30px上げ）
      const goY2   = H / 2 + goLine / 2 - 30;    // 「なくなりました」中心（30px上げ）
      ctx.font = `bold ${goFs}px 'Hiragino Mincho ProN',serif`;
      outText('なくなりました', W/2, goY2, '#ff8866', 'rgba(40,0,0,0.95)', 9); // 先に描画
      outText('ギヨウザが',     W/2, goY1, '#ff8866', 'rgba(40,0,0,0.95)', 9); // 後に描画→前面
    } else {
      ctx.font = `bold 56px 'Hiragino Mincho ProN',serif`;
      outText('ギヨウザがなくなりました', W/2, H/2 - 30, '#ff8866', 'rgba(40,0,0,0.95)', 9);
    }
    ctx.restore();

    /* 再スタート案内（点滅） */
    if (canRestart) {
      const blink = 0.45 + 0.45 * Math.sin(endTimer * 0.1);
      ctx.globalAlpha = blink * alpha;
      ctx.shadowBlur = 0;
      ctx.font = `bold 22px 'Hiragino Mincho ProN',serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      outText(
        'ギヨウザを10パック買って出直す',
        W/2, H/2 + (IS_PORTRAIT ? Math.round(44 * 1.3 / 2 + 44 - 30 + 20) : 55),
        '#ffe0d0', 'rgba(0,0,0,0.85)', 5
      );
    }
    ctx.restore();
  }
  ctx.restore();
}

/* ── ビートシンクメーター ── */
/* _syncBarColor: 固定バッファを再利用 + テンプレートリテラルを事前テーブルに置換 */
const _syncColorBuf = ['', '', 0];
function _syncBarColor(r) {
  /* 0=グレー → 0.4=赤 → 0.6=黄 → 0.8=緑 → 1.0=ゴールド
     テンプレートリテラル文字列の動的生成を排除するため _SYNC_RGB_TABLE を参照 */
  if (r >= 0.9) { _syncColorBuf[0]='#f5d020'; _syncColorBuf[1]='#f5a623'; _syncColorBuf[2]=1.0; return _syncColorBuf; }
  if (r >= 0.7) { const i=Math.min(63,(r-0.7)/0.2*63)|0; _syncColorBuf[0]=_SYNC_RGB_TABLE.green[i];  _syncColorBuf[1]='#40c840'; _syncColorBuf[2]=0.85; return _syncColorBuf; }
  if (r >= 0.5) { const i=Math.min(63,(r-0.5)/0.2*63)|0; _syncColorBuf[0]=_SYNC_RGB_TABLE.yellow[i]; _syncColorBuf[1]='#ddc020'; _syncColorBuf[2]=0.75; return _syncColorBuf; }
  if (r >= 0.3) { const i=Math.min(63,(r-0.3)/0.2*63)|0; _syncColorBuf[0]=_SYNC_RGB_TABLE.red[i];    _syncColorBuf[1]='#c83020'; _syncColorBuf[2]=0.65; return _syncColorBuf; }
  _syncColorBuf[0]='rgba(130,130,130,0.9)'; _syncColorBuf[1]='#888'; _syncColorBuf[2]=0.5; return _syncColorBuf;
}

function drawSyncMeter() {
  if (phase === 'startup') return;
  if (syncRateAboveCount < SYNC_VISIBLE_THRESHOLD) return;

  const pct     = syncRate;                         // 0-1
  const [fillC, glowC, glowStr] = _syncBarColor(pct);
  /* テキストキャッシュ: 値が変化した時のみ再生成（毎フレームのテンプレートリテラルを排除） */
  const pctRounded = Math.round(pct * 100);
  if (pctRounded !== _cachedSyncPctVal) { _cachedSyncPctVal = pctRounded; _cachedSyncPctStr = `SYNC ${pctRounded}%`; }
  if (syncChain   !== _cachedSyncChainVal) { _cachedSyncChainVal = syncChain; _cachedSyncChainStr = syncChain >= 2 ? `🎵×${syncChain}` : ''; }
  const pctText   = _cachedSyncPctStr;
  const chainText = _cachedSyncChainStr;

  ctx.save();

  /* ── 横画面・縦画面共通: BETバー直下の細いストリップ ── */
  const mx = IS_PORTRAIT ? 12    : 335;          // BETバー左端に合わせる
  const mw = IS_PORTRAIT ? W-24  : 390;          // BETバー幅に合わせる
  const my = IS_PORTRAIT ? P_BAR_Y + P_BAR_H + 2 : BAR_Y + BAR_H + 2;
  const mh = IS_PORTRAIT ? 16    : 14;

  /* ゲージバー */
  const bh = IS_PORTRAIT ? 6 : 5;
  const by = my + (mh - bh) / 2;
  roundRect(mx, by, mw, bh, bh / 2);
  ctx.fillStyle = 'rgba(40,40,40,0.7)'; ctx.fill();
  if (pct > 0) {
    roundRect(mx, by, mw * pct, bh, bh / 2);
    ctx.fillStyle = fillC;
    if (pct >= 0.9) { ctx.shadowColor = glowC; ctx.shadowBlur = 8; }
    ctx.fill(); ctx.shadowBlur = 0;
  }

  /* 目盛り線（25% / 50% / 75%） */
  ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = 1;
  for (let _ti = 0; _ti < 3; _ti++) {
    const lx = mx + mw * (_ti === 0 ? 0.25 : _ti === 1 ? 0.5 : 0.75);
    ctx.beginPath(); ctx.moveTo(lx, by); ctx.lineTo(lx, by + bh); ctx.stroke();
  }

  /* テキスト（ゲージ上に重ねる） */
  ctx.font = `bold 9px monospace`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(220,220,220,0.7)';
  ctx.fillText(pctText, mx + 6, my + mh / 2);
  if (chainText) {
    ctx.textAlign = 'right';
    ctx.fillStyle = '#f5d020';
    ctx.fillText(chainText, mx + mw - 6, my + mh / 2);
  }

  ctx.restore();
}

/* ── JUST/GOOD/OK ポップアップ ── */
function drawSyncJust() {
  if (syncJustTimer <= 0 || !syncJustLabel) return;
  const t = syncJustTimer / 50; // 1→0
  /* 最初の10fでフェードイン、残りでフェードアウト */
  const fadeIn  = Math.min(1, (1 - t) * 5);
  const fadeOut = t;
  const alpha   = fadeIn * fadeOut;
  if (alpha < 0.01) return;

  /* スケール: 発動直後に1.4倍→1.0に縮む */
  const scale = 1 + 0.4 * Math.pow(t, 0.5);

  /* 色: シンクメーターと同じ _syncBarColor を使用 */
  const [col, glw] = _syncBarColor(syncJustScore);

  /* 表示位置
     横: BETバー上端(H-106=414)の少し上 → y≈394、x=中央
     縦: 結果文字と同じx中心(WXS[0]=185)、第4的下・BETバー上 → y=712 */
  const px = IS_PORTRAIT ? WXS[0] : W / 2;
  const py = IS_PORTRAIT ? P_BAR_Y - 20 : BAR_Y - 20;
  const fs = IS_PORTRAIT ? 20  : 22;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(px, py);
  ctx.scale(scale, scale);
  ctx.font = `bold ${fs}px 'Hiragino Mincho ProN',serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = glw; ctx.shadowBlur = 14;
  ctx.fillStyle = col;
  ctx.fillText(syncJustLabel, 0, 0);
  ctx.restore();
}

/* ── スローハンド発動中バッジ（上部中央、BGMレートに連動してフェード） ── */
function drawSlowHandBadge() {
  if (phase === 'startup') return;
  if (phase === 'tapestart') return; // ゲームオーバー復帰アニメーション中は非表示
  if (isGameOver) return;
  /* grayRateCur: 1.0=通常→alpha0, 0.5=スロー→alpha1 に線形マッピング */
  const alpha = Math.max(0, Math.min(1, (1.0 - grayRateCur) * 2));
  if (alpha < 0.01) return;

  /* ポップスケール: 発動直後に大きく出てeaseOutで縮む (25f→1.0x) */
  const POP_FRAMES = 25;
  const popScale = slowHandPopTimer > 0
    ? 1 + 1.4 * Math.pow(slowHandPopTimer / POP_FRAMES, 2)
    : 1;

  ctx.save();
  ctx.globalAlpha = alpha;

  const text  = '🐌  ス ロ ー ハ ン ド  発 動 中';
  const fs    = IS_PORTRAIT ? 13 : 14;
  ctx.font    = `bold ${fs}px 'Hiragino Mincho ProN',serif`;
  const tw    = ctx.measureText(text).width;
  const padX  = 18, padY = 7;
  const bw    = tw + padX * 2;
  const bh    = fs + padY * 2;
  const bx    = (W - bw) / 2;
  const by    = IS_PORTRAIT ? 10 : 8;

  /* スケール変形: バッジ中心を基準に拡縮 */
  if (popScale !== 1) {
    ctx.translate(W / 2, by + bh / 2);
    ctx.scale(popScale, popScale);
    ctx.translate(-W / 2, -(by + bh / 2));
  }

  /* 背景ピル */
  ctx.beginPath();
  const r = bh / 2;
  ctx.moveTo(bx + r, by);
  ctx.lineTo(bx + bw - r, by);
  ctx.arcTo(bx + bw, by, bx + bw, by + bh, r);
  ctx.lineTo(bx + bw, by + bh - r);
  ctx.arcTo(bx + bw, by + bh, bx + bw - r, by + bh, r);
  ctx.lineTo(bx + r, by + bh);
  ctx.arcTo(bx, by + bh, bx, by + bh - r, r);
  ctx.lineTo(bx, by + r);
  ctx.arcTo(bx, by, bx + r, by, r);
  ctx.closePath();
  ctx.fillStyle = 'rgba(20,10,60,0.82)';
  ctx.fill();
  ctx.strokeStyle = `rgba(160,130,255,${0.7 * alpha})`;
  ctx.lineWidth = 1.2;
  ctx.stroke();

  /* テキスト */
  ctx.fillStyle = '#e8d8ff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, W / 2, by + bh / 2);

  ctx.restore();
}

/* ── 実績一覧オーバーレイ ──
   縦画面: 1カラム・行高44px・クリップ表示（全18件収まる）
   PC版 : 2カラム                                              */

function drawAchOverlay() {
  if (!showAchievements) return;

  /* ── パネルサイズをレイアウトに合わせて決定 ── */
  /* 縦画面: アイコン右端(46) + 12px = 58 → パネル左端
             右ボタン左端(374) - 12px = 362 → パネル右端
             pw = 362 - 58 = 304                                */
  const px = IS_PORTRAIT ? 58        : 60;
  const py = IS_PORTRAIT ? 16        : 30;
  const pw = IS_PORTRAIT ? 304       : W - 120;
  const ph = IS_PORTRAIT ? H - 32    : H - 60;

  ctx.save();
  /* 暗幕 */
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);
  /* パネル */
  roundRect(px, py, pw, ph, 12);
  ctx.fillStyle = 'rgba(8,40,15,0.97)'; ctx.fill();
  ctx.strokeStyle = Y; ctx.lineWidth = 2; ctx.stroke();

  /* タイトル */
  const titleH = IS_PORTRAIT ? 38 : 48;
  ctx.font = `bold ${IS_PORTRAIT ? 18 : 24}px 'Hiragino Mincho ProN',serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = Y;
  ctx.fillText('🏆 実績一覧', px + pw/2, py + titleH/2);
  /* 区切り線 */
  ctx.beginPath();
  ctx.moveTo(px+16, py+titleH); ctx.lineTo(px+pw-16, py+titleH);
  ctx.strokeStyle = 'rgba(245,208,32,0.3)'; ctx.lineWidth=1; ctx.stroke();

  /* ── レイアウト計算 ── */
  const listY  = py + titleH + 4;
  const footH  = 22;
  const listH  = ph - titleH - 4 - footH;
  const COL    = IS_PORTRAIT ? 1 : 2;
  const ROWS   = Math.ceil(ACHIEVEMENTS.length / COL);
  const rowH   = IS_PORTRAIT ? Math.floor(listH / ACHIEVEMENTS.length)
                              : Math.floor(listH / ROWS);
  const colW   = Math.floor((pw - 8) / COL);

  /* PC版: 中央縦区切り線 */
  if (!IS_PORTRAIT) {
    ctx.beginPath();
    ctx.moveTo(px + 4 + colW, listY); ctx.lineTo(px + 4 + colW, listY + rowH * ROWS);
    ctx.strokeStyle = 'rgba(245,208,32,0.15)'; ctx.lineWidth=1; ctx.stroke();
  }

  /* クリップ（リスト範囲内のみ描画） */
  ctx.save();
  ctx.beginPath();
  ctx.rect(px, listY, pw, listH);
  ctx.clip();

  /* リスト */
  ACHIEVEMENTS.forEach((ach, i) => {
    const col = IS_PORTRAIT ? 0 : Math.floor(i / ROWS);
    const row = IS_PORTRAIT ? i : i % ROWS;
    const lx  = px + 4 + col * colW;
    const ry  = listY + row * rowH;
    const mid = ry + rowH / 2;
    const unlocked = !!unlockedAch[ach.id];

    /* 交互背景 */
    if (row % 2 === 0) {
      roundRect(lx+1, ry+1, colW-2, rowH-2, 3);
      ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.fill();
    }

    ctx.globalAlpha = unlocked ? 1 : 0.35;

    /* ステータス丸 */
    const circR = IS_PORTRAIT ? 8 : 9;
    const circX = lx + (IS_PORTRAIT ? 16 : 18);
    ctx.beginPath();
    ctx.arc(circX, mid, circR, 0, Math.PI*2);
    ctx.fillStyle   = unlocked ? '#2ecc40' : 'rgba(120,120,120,0.5)'; ctx.fill();
    ctx.strokeStyle = unlocked ? '#27ae35' : 'rgba(160,160,160,0.4)';
    ctx.lineWidth = 1.4; ctx.stroke();
    if (unlocked) {
      ctx.beginPath();
      ctx.moveTo(circX-4, mid); ctx.lineTo(circX-1, mid+4); ctx.lineTo(circX+5, mid-4);
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(circX, mid-3); ctx.lineTo(circX, mid+3);
      ctx.strokeStyle='rgba(200,200,200,0.7)'; ctx.lineWidth=1.8; ctx.stroke();
    }

    /* アイコン */
    const iconX  = lx + (IS_PORTRAIT ? 32 : 34);
    const textX  = lx + (IS_PORTRAIT ? 52 : 56);
    const nameFs = IS_PORTRAIT ? 13 : 13;
    const descFs = IS_PORTRAIT ? 11 : 11;
    const nameOY = IS_PORTRAIT ? -7 : -7;
    const descOY = IS_PORTRAIT ?  7 :  7;

    ctx.fillStyle='#ffffff';
    ctx.font=`${IS_PORTRAIT ? 15 : 16}px serif`;
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(ach.icon, iconX, mid);

    /* 実績名 */
    ctx.font=`bold ${nameFs}px 'Hiragino Mincho ProN',serif`;
    ctx.fillStyle = unlocked ? Y : 'rgba(245,208,32,0.5)';
    ctx.fillText(ach.name, textX, mid + nameOY);

    /* 説明文 */
    ctx.font=`${descFs}px 'Hiragino Mincho ProN',serif`;
    ctx.fillStyle = unlocked ? 'rgba(255,255,255,0.75)' : 'rgba(255,255,255,0.28)';
    ctx.fillText(ach.desc, textX, mid + descOY);

    ctx.globalAlpha = 1;
  });

  ctx.restore(); // クリップ解除

  /* 解除数 */
  const cnt = ACHIEVEMENTS.filter(a => !!unlockedAch[a.id]).length;
  ctx.font = `${IS_PORTRAIT ? 11 : 11}px 'Hiragino Mincho ProN',serif`;
  ctx.textAlign='right'; ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(245,208,32,0.45)';
  ctx.fillText(`${cnt} / ${ACHIEVEMENTS.length} 解除済み`, px+pw-12, py+ph-6);

  ctx.restore();
}


/* ════════════════ Startup Screen ════════════════ */

}

/* ════════════════ Loop / Input ════════════════ */
/* startup フェーズ: lsLoad/lsLoadAch だけ行い、画面は startup のままにする */
lsCheckSchema(); // スキーマ不一致なら全データクリア（lsLoad/lsLoadAch の前に必ず実行）
lsLoad();        // bet もここで復元される
lsLoadAch();
lsLoadStats();
if (!BET_OPTIONS.includes(bet)) bet = 1; // 未保存時のみデフォルト1
isGameOver = false;
phase = 'startup';
wheels = WXS.map((x, i) => createWheel(x, WYS[i])); // ホイールだけ初期化（背景描画用）
particles = [];

(function loop(){ update(); draw(); requestAnimationFrame(loop); })();

function onShoot(_inputAudioTime){
  /* idle と reach の両フェーズで矢を放てる */
  if (phase!=='idle' && phase!=='reach') return;
  /* リーチ発動直後はエフェクト・SEを見せるため入力ロック */
  if (phase === 'reach' && reachTimer < REACH_LOCK_FRAMES) return;
  /* スローハンド発動直後はバッジ・テンポ変化に気づくまで入力ロック */
  if (slowHandLockFrames > 0) return;
  if (curIdx>=4) return;
  if (shootGuard > 0) return; // init直後の誤射ブロック
  /* ── ビートシンクスコアを最初にキャプチャ（以降の処理による時刻ズレを防ぐ） ── */
  const _syncScore = (audioCtx && bgmPhaseRef !== null) ? calcSyncScore(_inputAudioTime) : null;
  /* 最初の矢: ベット確定 & コイン消費 & 実績 */
  if (curIdx === 0) {
    if (coins < bet) return; // 念のため
    betLocked = true;
    coins -= bet;
    unlockAch('first_shot');
    if (bet >= 100) unlockAch('bet_max');
    /* プレイ回数カウント */
    playCount++;
    if (playCount >= 100) unlockAch('play_10');
    if (playCount >= 500) unlockAch('play_50');
    lsSaveStats();
  }
  /* 矢数カウント */
  shotCount++;
  if (shotCount >= 1000) unlockAch('shot_100');
  lsSaveStats();
  const w=wheels[curIdx];
  w.result=hitResult(w); w.locked=true;
  phase='shooting';
  /* 発射時刻を記録:
     _arrowStartWallTime: アニメーション進行用（performance.now: suspended中も止まらない）
     _arrowStartAudioTime: 着弾音スケジュール用（audioCtx.currentTime: 音声API基準） */
  _arrowStartWallTime  = performance.now() / 1000;
  _arrowStartAudioTime = audioCtx ? audioCtx.currentTime + 0.01 : 0;
  playSE('shoot'); // currentTime + 0.01 で即再生
  /* ── ビートシンク評価（先頭でキャプチャした値を使用） ── */
  if (_syncScore !== null) {
    const score = _syncScore;
    w.syncScore = score; // 結果文字の色付けに使用
    /* リングバッファへ追記 + syncRate更新（_pushSyncScore共通ヘルパー） */
    _pushSyncScore(score);
    /* このビートは発射済みとしてマーク（auto-decayが二重にカウントしないよう） */
    _autoDecayBeatIdx = BGM_BEAT > 0 ? Math.floor(_bgmAccumAudioTime / (BGM_BEAT * 2)) : -1;
    /* JUST/GOOD/OK 演出: 連続してsyncRate≥0.5になってから表示 */
    if (syncRateAboveCount >= SYNC_VISIBLE_THRESHOLD) {
      if (score >= 0.667) {        // ±33ms以内 → JUST
        syncJustLabel = 'JUST!'; syncChain++;
      } else if (score >= 0.333) { // ±67ms以内 → GOOD
        syncJustLabel = 'GOOD';  syncChain++;
      } else if (score > 0) {      // ±100ms以内 → OK
        syncJustLabel = 'OK';    syncChain = 0;
      } else {                     // ±150ms超 → NG
        syncJustLabel = '';      syncChain = 0;
      }
      if (syncJustLabel) { syncJustTimer = 50; syncJustScore = score; }
    } else {
      syncJustLabel = ''; syncChain = 0;
    }
  }
  arrowProgress=0;
  if (IS_PORTRAIT) {
    arrowSX=-40; arrowSY=w.y; arrowTX=w.x+WR+5; arrowTY=w.y;
  } else {
    arrowSX=W/2; arrowSY=H+30; arrowTX=w.x; arrowTY=w.y-WR-5;
  }
}
/* クリック/タップの共通処理
   - idle/reach       : 即時発射
   - done(ハズレ)     : 先打ちバッファ登録。canRestartなら即時リセット＋発射
   - done(当たり)     : エフェクト中は無視。canRestart後はリセットのみ（発射しない）
   - done(GO)         : canRestartなら gameOverReset
   - tapestart        : 先打ちバッファ登録（解放時に自動発射）
   - shooting(4本目)  : 先打ちバッファ登録（当たりなら即破棄、ハズレなら着弾後に発射）
   その他フェーズ     : 無視 */
function handleGameClick(inputAudioTime) {
  if (phase === 'done') {
    if (isGameOver) { if (canRestart) gameOverReset(); return; }
    if (isMissResult) {
      /* ハズレ: 結果文字を即座に完全表示してバッファ登録。canRestartなら即時リセット＋発射 */
      for (const w of wheels) { if (w.result) w.resultPop = 1; }
      pendingShoot = true;
      if (canRestart) {
        init(); shootGuard = 0; pendingShoot = false; onShoot(inputAudioTime);
      }
      return;
    }
    /* 当たり: エフェクト終了前は無視。終了後（canRestart）はリセットのみ、発射しない */
    if (canRestart) {
      init(); shootGuard = 0;
    }
    return;
  }
  if (phase === 'tapestart') { pendingShoot = true; return; }
  /* 4本目の矢が飛行中（curIdx===3）にクリックした場合、着弾→done直後にそのまま発射 */
  if (phase === 'shooting' && curIdx === 3) { pendingShoot = true; return; }
  /* スローランプ中（BGMテンポ加減速）はクリックを無視: せっかくの演出を邪魔しない
     ただし AudioContext が suspended の場合は currentTime が止まるためロックを免除する */
  if (slowRampEndTime > 0 && audioCtx && audioCtx.state !== 'suspended'
      && audioCtx.currentTime < slowRampEndTime) return;
  onShoot(inputAudioTime); // idle / reach
}

const CHEAT_MAP = { 'KeyG':'ギ', 'KeyY':'ヨ', 'KeyU':'ウ', 'KeyZ':'ザ' };

function cheatShoot(char) {
  if (phase!=='idle'||curIdx>=4) return;
  const w = wheels[curIdx];
  const s = w.segs.find(seg => seg.char === char);
  if (!s) return;
  /* ポインタ位置にセグメント中央が来るよう回転を強制 */
  w.rot = (IS_PORTRAIT ? 0 : -Math.PI/2) - s.start - s.span/2;
  onShoot();
}

document.addEventListener('keydown', e=>{
  if (phase === 'startup') {
    if (e.code === 'Space') { e.preventDefault(); initGame(); }
    return;
  }
  if (showAchievements) {
    e.preventDefault(); showAchievements = false; return;
  }
  if (e.code==='Space') {
    e.preventDefault();
    handleGameClick();
    return;
  }
  /* カーソル左右でBET変更 */
  if ((e.code==='ArrowLeft'||e.code==='ArrowRight') && !betLocked && (phase==='idle'||phase==='reach')) {
    e.preventDefault();
    /* スローハンドランプ中はBET変更ロック（suspended時は currentTime が止まるためロック免除） */
    if (slowRampEndTime > 0 && audioCtx && audioCtx.state !== 'suspended'
        && audioCtx.currentTime < slowRampEndTime) return;
    changeBet(e.code==='ArrowLeft' ? -1 : +1);
    return;
  }
  if (CHEAT_MAP[e.code] && phase==='idle' && curIdx<4) {
    e.preventDefault();
    cheatShoot(CHEAT_MAP[e.code]);
  }
  /* 隠しコマンド: Ctrl+C → localStorage全消去してリロード */
  if (e.code === 'KeyC' && e.ctrlKey) {
    e.preventDefault();
    try { localStorage.clear(); } catch(err) {}
    location.reload();
  }
  /* デバッグ: Ctrl+T → スローイベント強制トグル */
  if (e.code === 'KeyT' && e.ctrlKey) {
    e.preventDefault();
    const prev = isSlowSpin;
    isSlowSpin = !isSlowSpin;
    if (isSlowSpin && !prev) {
      rampBGMRate(_slowHandRate(bet), 1200, 'easeOut', true); // Ctrl+T: BET対応速度、ランプ中は入力ブロック
      slowHandLockFrames = 60; // 約1秒の入力ロック
      slowHandPopTimer   = 25; // バッジポップアニメーション開始
      playSE('slow_hand');     // 発動SE
    } else if (!isSlowSpin && prev) {
      rampBGMRate(1.0, 1200, 'easeIn',  true); // Ctrl+T: ランプ中は入力ブロック
    }
    /* ホイール速度も即時反映（BET対応レートで倍率計算） */
    const _rate = _slowHandRate(bet);
    for (const w of wheels) w.speed *= isSlowSpin ? _rate : (1 / _rate);
  }
});

canvas.addEventListener('mousedown', e=>{
  if (e.button !== 0) return;
  /* 入力物理発生時刻をオーディオ時刻に換算（ハンドラ到達前の遅延を補正） */
  const inputAudioTime = inputEventToAudioTime(e.timeStamp);
  /* _canvasRect キャッシュを使用（getBoundingClientRect() 強制レイアウトを排除） */
  const cx = (e.clientX - _canvasRect.left) * (W / _canvasRect.width);
  const cy = (e.clientY - _canvasRect.top)  * (H / _canvasRect.height);
  if (phase === 'startup') {
    if (hitTest(ACH_TROPHY, cx, cy)) { showAchievements = !showAchievements; return; }
    if (hitTest(MUTE_BTN, cx, cy)) { if (!audioCtx) getAudioCtx(); toggleMute(); return; }
    if (showAchievements) { showAchievements = false; return; }
    if (hitTest(STARTUP_BTN, cx, cy)) { initGame(); return; }
    return;
  }
  if (showAchievements) { showAchievements = false; return; }
  if (hitTest(ACH_TROPHY, cx, cy)) { showAchievements = true; return; }
  if (hitTest(MUTE_BTN, cx, cy)) {
    /* AudioContextがなければ初期化してからミュート切り替え */
    if (!audioCtx) getAudioCtx();
    toggleMute(); return;
  }
  /* ベット◀▶ボタン（縦画面 or PCボトムバー） */
  if (!betLocked && (phase==='idle'||phase==='reach')) {
    /* スローハンドランプ中はBET変更ロック */
    if (!(slowRampEndTime > 0 && audioCtx && audioCtx.state !== 'suspended'
          && audioCtx.currentTime < slowRampEndTime)) {
      const decBtn = IS_PORTRAIT ? P_BET_DEC_BTN : BET_DEC_BTN;
      const incBtn = IS_PORTRAIT ? P_BET_INC_BTN : BET_INC_BTN;
      if (decBtn && hitTest(decBtn, cx, cy)) { changeBet(-1); return; }
      if (incBtn && hitTest(incBtn, cx, cy)) { changeBet(+1); return; }
    }
  }
  handleGameClick(inputAudioTime);
});

/* タッチ操作対応（ページ内どこでもタップで反応） */
document.addEventListener('touchstart', e=>{
  if (e.target.closest('#fs-btn')) return;
  e.preventDefault();
  /* iOS Safari: バックグラウンド復帰後に suspended になった AudioContext をタップで resume
     state チェックは string 比較のみ（アロケーションなし）、suspended 時のみ resume() を呼ぶ */
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  /* 入力物理発生時刻をオーディオ時刻に換算 */
  const inputAudioTime = inputEventToAudioTime(e.timeStamp);
  const pt = touchToCanvas(e.touches[0]);

  if (phase === 'startup') {
    if (hitTest(ACH_TROPHY, pt.x, pt.y)) { showAchievements = !showAchievements; return; }
    if (hitTest(MUTE_BTN, pt.x, pt.y)) { if (!audioCtx) getAudioCtx(); toggleMute(); return; }
    if (showAchievements) { showAchievements = false; return; }
    if (hitTest(STARTUP_BTN, pt.x, pt.y)) { initGame(); return; }
    return;
  }
  /* 実績オーバーレイ中 */
  if (showAchievements) { showAchievements = false; return; }
  /* トロフィーボタン */
  if (hitTest(ACH_TROPHY, pt.x, pt.y)) { showAchievements = true; return; }

  /* ミュートボタン */
  if (hitTest(MUTE_BTN, pt.x, pt.y)) {
    if (!audioCtx) getAudioCtx();
    toggleMute(); return;
  }

  /* スマホ: ベット◀▶ボタン */
  if (!betLocked && (phase==='idle'||phase==='reach')) {
    /* スローハンドランプ中はBET変更ロック */
    if (!(slowRampEndTime > 0 && audioCtx && audioCtx.state !== 'suspended'
          && audioCtx.currentTime < slowRampEndTime)) {
      const decBtn = IS_PORTRAIT ? P_BET_DEC_BTN : BET_DEC_BTN;
      const incBtn = IS_PORTRAIT ? P_BET_INC_BTN : BET_INC_BTN;
      if (decBtn && hitTest(decBtn, pt.x, pt.y)) { changeBet(-1); return; }
      if (incBtn && hitTest(incBtn, pt.x, pt.y)) { changeBet(+1); return; }
    }
  }

  handleGameClick(inputAudioTime);
}, { passive: false });

/* ── キャンバスをビューポートに合わせてスケール ── */
function fitCanvas() {
  /* visualViewport はブラウザUIを除いた実際の表示領域を返す
     iOS Safari のアドレスバー・タブバーがある場合も正確なサイズが得られる */
  const vv     = window.visualViewport;
  const vpW    = vv ? vv.width  : document.documentElement.clientWidth;
  const vpH    = vv ? vv.height : document.documentElement.clientHeight;

  const h1El   = document.querySelector('h1');
  const titleH = (h1El && getComputedStyle(h1El).display !== 'none')
    ? h1El.getBoundingClientRect().height + 6 : 0;
  const MARGIN = 8;
  const scale  = Math.min((vpW - MARGIN * 2) / W, (vpH - MARGIN * 2 - titleH) / H);
  canvas.style.width  = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
  /* 背景グラジェントを再生成（canvasサイズ変化時のみ） */
  bgGradient = ctx.createLinearGradient(0, 0, 0, H);
  bgGradient.addColorStop(0, '#145c24');
  bgGradient.addColorStop(0.5, '#0f5020');
  bgGradient.addColorStop(1, '#0a3d18');

  /* 静的レイヤー（雲・獅子）を OffscreenCanvas に事前描画
     毎フレームの Canvas パス命令群 → drawImage() 1回に圧縮 */
  _prebuildStaticLayers();
  /* BET ラベル幅を計測してキャッシュ（フォント・テキスト不変なので1回だけ） */
  _initBetLabelWidth();

  /* 全画面ボタンの位置・サイズを canvas 座標に同期
     display チェックなしで常に計算し、表示時に正しい位置になるようにする */
  const fsEl = document.getElementById('fs-btn');
  if (fsEl) {
    fsEl.style.left   = Math.round(FS_BTN_RECT.x * scale) + 'px';
    fsEl.style.top    = Math.round(FS_BTN_RECT.y * scale) + 'px';
    fsEl.style.width  = Math.round(FS_BTN_RECT.w * scale) + 'px';
    fsEl.style.height = Math.round(FS_BTN_RECT.h * scale) + 'px';
    fsEl.style.right  = '';
  }

  /* _canvasRect キャッシュを更新: 入力ハンドラ内での getBoundingClientRect() 強制レイアウトを排除 */
  requestAnimationFrame(() => { _canvasRect = canvas.getBoundingClientRect(); });
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', () => setTimeout(() => location.reload(), 300));
/* visualViewport のリサイズ（アドレスバー出現・消滅）にも追従 */
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', fitCanvas);
}
fitCanvas();

/* ── 全画面ボタン（Fullscreen API 対応環境のみ表示） ── */
const fsBtn = document.getElementById('fs-btn');
const FS_SUPPORTED = !!(document.fullscreenEnabled || document.webkitFullscreenEnabled);

/* SVGアイコン: Material Design fullscreen / fullscreen_exit */
const FS_SVG_ENTER = `<svg viewBox="0 0 24 24" width="20" height="20" fill="#f5d020" xmlns="http://www.w3.org/2000/svg">
  <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
</svg>`;
const FS_SVG_EXIT  = `<svg viewBox="0 0 24 24" width="20" height="20" fill="#f5d020" xmlns="http://www.w3.org/2000/svg">
  <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
</svg>`;

if (FS_SUPPORTED) {
  fsBtn.style.display = 'flex';
  fsBtn.innerHTML = FS_SVG_ENTER;
  fitCanvas(); // 表示ON後に位置を再計算

  function toggleFullscreen() {
    const el = document.documentElement;
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      const req = el.requestFullscreen || el.webkitRequestFullscreen;
      if (req) req.call(el).catch(()=>{});
    } else {
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (exit) exit.call(document).catch(()=>{});
    }
  }

  fsBtn.addEventListener('click', e => { e.stopPropagation(); toggleFullscreen(); });
  fsBtn.addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation(); toggleFullscreen();
  }, { passive: false });

  function onFsChange() {
    const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    fsBtn.innerHTML = inFs ? FS_SVG_EXIT : FS_SVG_ENTER;
    setTimeout(fitCanvas, 150);
  }
  document.addEventListener('fullscreenchange', onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);
}
</script>
